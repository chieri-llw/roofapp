<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外壁積算 Pro</title>
<style>
:root{--bg:#0a0c10;--or:#FF6B2B;--bl:#3b82f6;--gn:#22c55e;--pu:#a855f7;--bd:#252830;--card:#111318;--in:#070910}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:#e2e4e9;display:flex;height:100vh;overflow:hidden}
/* ── SIDEBAR ── */
.sb{width:264px;min-width:264px;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.sb-s{flex:1;overflow-y:auto;padding:14px}
.sb-f{padding:11px 14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:7px}
.sec{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 6px;font-weight:700}
.sec:first-child{margin-top:0}
input[type=text],input[type=password],input[type=number]{width:100%;background:var(--in);border:1px solid #2e3140;color:#e8eaf0;padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--or)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:#2e3140;cursor:pointer;outline:none;margin:3px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--or);cursor:pointer}
.btn{padding:8px 13px;border-radius:6px;border:1px solid #3a3d48;background:#191c26;color:#bbb;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;transition:background .15s,color .15s}
.btn:hover{background:#252830;color:#fff}
.btn.on{background:#fff;color:#000;border-color:#fff}
.btn-or{background:var(--or);border:none;color:#fff}.btn-or:hover{background:#e55c20}
.btn-bl{background:var(--bl);border:none;color:#fff}.btn-bl:hover{background:#2563eb}
.btn-pu{background:var(--pu);border:none;color:#fff}.btn-pu:hover{background:#9333ea}
.btn-gn{background:var(--gn);border:none;color:#fff}.btn-gn:hover{background:#16a34a}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-f{width:100%;display:block}
.cbadge{background:var(--in);border:1px solid #FF6B2B33;border-radius:6px;padding:8px 10px;text-align:center;color:var(--or);font-weight:700;font-size:12px;min-height:32px;display:flex;align-items:center;justify-content:center;word-break:break-all;margin-top:6px}
.sc-card{background:#181b24;border:1px solid var(--bd);border-left:3px solid var(--bl);border-radius:6px;padding:9px 11px;margin-bottom:6px}
.sc-card .fn{font-weight:700;font-size:12px;color:#dde}
.sc-card .fa{font-size:19px;color:var(--or);font-weight:700;margin:2px 0}
.sc-card .fd{font-size:11px;color:#555}
.tot{display:flex;justify-content:space-between;align-items:center;background:#181b24;border:1px solid #FF6B2B2a;border-radius:6px;padding:8px 11px;margin-top:8px}
.tot-v{font-size:22px;font-weight:700;color:var(--or)}.tot-l{font-size:11px;color:#666}
.prow{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.prow span{font-size:10px;color:#666}.prow strong{font-size:12px;color:var(--or)}
.mask-badge{background:#1a0d2e;border:1px solid #5b21b6;border-radius:7px;padding:6px 10px;font-size:10px;color:#c084fc;text-align:center;display:none;margin-top:6px}
.ai-progress{display:none;padding:8px 10px;border-radius:6px;background:#1a0d2e;border:1px solid #3d1f6e;font-size:11px;color:#c084fc;text-align:center;margin-top:6px;line-height:1.8}
.ai-progress .dot{animation:blink 1s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ai-result{display:none;padding:8px 10px;border-radius:6px;background:#0a2015;border:1px solid rgba(34,197,94,.3);font-size:11px;color:#4ade80;margin-top:6px}
.ai-error{display:none;padding:8px 10px;border-radius:6px;background:#1a0000;border:1px solid rgba(239,68,68,.3);font-size:11px;color:#f87171;margin-top:6px}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.tb{height:auto;min-height:54px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:6px 10px;gap:6px;flex-shrink:0;overflow-x:auto;flex-wrap:wrap}
.sep{width:1px;height:26px;background:var(--bd);flex-shrink:0}
.cw{flex:1;position:relative;overflow:hidden;background:#040507;display:flex;align-items:center;justify-content:center}
canvas{position:absolute;touch-action:none}
#mc{z-index:0}
#edgeOv{z-index:1;pointer-events:none}
#buildMask{z-index:2;pointer-events:none}
#ov{z-index:3}
.rp{position:absolute;bottom:14px;right:14px;background:rgba(4,5,7,.93);border:1px solid var(--or);border-radius:10px;padding:13px 17px;min-width:148px;text-align:right;z-index:10;display:none;backdrop-filter:blur(4px)}
.rp-v{font-size:34px;font-weight:700;color:var(--or);line-height:1}
.rp-u{font-size:11px;color:#666;margin-top:2px}
.rp-d{font-size:11px;color:#555;margin-top:8px;line-height:1.7}
.st{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(4,5,7,.92);border:1px solid #333;border-radius:8px;padding:6px 14px;font-size:12px;color:#777;z-index:10;white-space:nowrap;pointer-events:none;display:none}
.st.info{border-color:var(--bl);color:#60a5fa}
.st.ok{border-color:var(--gn);color:#4ade80}
.st.err{border-color:#ef4444;color:#f87171}
.st.warn{border-color:#f59e0b;color:#fbbf24}
.sc-row{display:none;align-items:center;gap:5px}
.sc-row input{width:68px}.sc-row span{font-size:12px;color:#666}
.draw-ctrl,.fill-ctrl{display:none;align-items:center;gap:4px;flex-shrink:0}
.dt-btn{padding:5px 9px;border-radius:6px;border:1px solid #3a3d48;background:#191c26;color:#555;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .15s}
.dt-btn.wall-on{background:#2a0e00;border-color:var(--or);color:var(--or)}
.dt-btn.open-on{background:#071a38;border-color:var(--bl);color:var(--bl)}
.tb-sl{display:flex;align-items:center;gap:3px;font-size:10px;color:#555}
.tb-sl input[type=range]{width:56px;margin:0}
.tb-sl .v{min-width:20px;font-weight:700;color:var(--or);font-size:11px;text-align:right}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:center;justify-content:center}
.mbg.open{display:flex}
.md{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px;width:400px;max-width:92vw}
.md h3{color:var(--or);margin-bottom:14px;font-size:15px}
.md .ig{margin-bottom:11px}.md .ig label{font-size:11px;color:#777;display:block;margin-bottom:3px}
.md .mr{display:flex;gap:8px;margin-top:14px}.md .mr .btn{flex:1}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;vertical-align:middle;margin-right:5px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2d38;border-radius:2px}
.row{display:flex;gap:6px;align-items:center}.row input{flex:1}
@media(max-width:700px){body{flex-direction:column;height:auto;overflow-y:auto}.sb{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--bd)}.main{height:80vw}}
</style>
</head>
<body>

<!-- ══════════ SIDEBAR ══════════ -->
<div class="sb">
  <div class="sb-s">
    <div class="sec">案件情報</div>
    <div class="row" style="margin-bottom:6px">
      <input type="text" id="opCode" placeholder="コード (NK)" style="width:80px;flex:none">
      <input type="text" id="clName" placeholder="依頼主名">
    </div>
    <input type="text" id="addr" placeholder="住所（任意）" style="margin-bottom:8px">
    <button class="btn btn-or btn-f" onclick="initCase()">案件を新規登録</button>
    <div class="cbadge" id="cbadge">— 案件未登録 —</div>

    <div class="sec">✨ AI 建物検出</div>
    <div style="font-size:9px;color:#555;margin-bottom:4px">Google Gemini APIキー</div>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off" style="margin-bottom:6px">
    <div style="font-size:9px;color:#444;margin-bottom:6px;line-height:1.6"><a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa">aistudio.google.com</a> で無料取得</div>
    <button class="btn btn-pu btn-f" id="aiBtn" onclick="runAIDetect()">🤖 AIで建物を自動検出</button>
    <div class="ai-progress" id="aiProgress">Claude AIが建物を解析中<span class="dot">...</span></div>
    <div class="ai-result" id="aiResult"></div>
    <div class="ai-error" id="aiError"></div>
    <div class="mask-badge" id="maskBadge">🏠 建物マスク適用中 — 建物外はクリック不可</div>

    <div class="sec">撮影面リスト</div>
    <div id="sideList"></div>
    <div class="tot" id="totRow" style="display:none">
      <span class="tot-l">合計 純塗装面積</span>
      <span class="tot-v" id="totVal">0.00</span>
    </div>
    <div style="font-size:10px;color:#444;text-align:right;margin-top:2px" id="totUnit"></div>

    <div class="sec">検出パラメータ</div>
    <div class="prow"><span>🔲 エッジ感度</span><strong id="edgeValLbl">35</strong></div>
    <input type="range" id="edgeSl" min="5" max="100" value="35" oninput="onParamChange()">
    <div class="prow" style="margin-top:7px"><span>🎨 色許容（フラッドフィル）</span><strong id="tolValLbl">25</strong></div>
    <input type="range" id="tolSl" min="5" max="80" value="25" oninput="onParamChange()">
  </div>

  <div class="sb-f">
    <div>
      <div style="font-size:11px;color:#777;margin-bottom:3px">撮影面名称</div>
      <div class="row">
        <input type="text" id="faceName" value="東面">
        <button class="btn btn-sm btn-bl" onclick="recordFace()">📋 記録</button>
      </div>
    </div>
    <button class="btn btn-sm btn-f" onclick="openSettings()">⚙ 設定（GAS URL）</button>
  </div>
</div>

<!-- ══════════ MAIN ══════════ -->
<div class="main">
  <div class="tb">
    <input type="file" id="fi" style="display:none" accept="image/*" onchange="handleFile(this)">
    <button class="btn" onclick="document.getElementById('fi').click()">📷 写真</button>
    <div class="sep"></div>
    <button id="btnSc" class="btn" onclick="setMode('scale')">📏 実寸設定</button>
    <div class="sc-row" id="scRow">
      <input type="number" id="realMm" value="1800" min="1">
      <span>mm</span>
    </div>
    <div class="sep"></div>
    <button id="btnAd" class="btn" onclick="setMode('adjust')">🖱 頂点修正</button>
    <div class="sep"></div>
    <button id="btnDr" class="btn" onclick="setMode('draw')">✏️ ポリゴン作成</button>
    <div class="draw-ctrl" id="drawCtrl">
      <button class="dt-btn wall-on" id="dtWall" onclick="setDrawType('wall')">🟠 外壁</button>
      <button class="dt-btn" id="dtOpen" onclick="setDrawType('opening')">🟢 開口</button>
      <button class="btn btn-sm btn-gn" id="btnConfirm" onclick="confirmDrawPoly()" style="display:none">✅ 確定</button>
      <button class="btn btn-sm" onclick="cancelDraw()" style="color:#f87171;border-color:#f87171">✕ 取消</button>
    </div>
    <div class="sep"></div>
    <button id="btnFl" class="btn" onclick="setMode('fill')">🎯 スマート選択</button>
    <div class="fill-ctrl" id="fillCtrl">
      <button class="dt-btn wall-on" id="ftWall" onclick="setFillType('wall')">🟠 外壁</button>
      <button class="dt-btn" id="ftOpen" onclick="setFillType('opening')">🟢 開口</button>
      <div class="tb-sl"><span>E:</span><input type="range" id="edgeSl2" min="5" max="100" value="35" oninput="syncEdge(this)"><span class="v" id="edgeV2">35</span></div>
      <div class="tb-sl"><span>T:</span><input type="range" id="tolSl2" min="5" max="80" value="25" oninput="syncTol(this)"><span class="v" id="tolV2">25</span></div>
    </div>
    <div class="sep"></div>
    <button class="btn btn-sm" onclick="undoLast()" style="color:#aaa">↩ 戻す</button>
    <button class="btn btn-sm" onclick="doClear()" style="color:#555">🗑 全消去</button>
  </div>

  <div class="cw" id="cw">
    <canvas id="mc"></canvas>
    <canvas id="edgeOv"></canvas>
    <canvas id="buildMask"></canvas>
    <canvas id="ov"></canvas>
  </div>

  <div class="rp" id="rp">
    <div class="rp-v" id="rpV">—</div>
    <div class="rp-u">純塗装面積 m²</div>
    <div class="rp-d" id="rpD"></div>
  </div>

  <div class="st" id="st"></div>
</div>

<!-- ══════════ SETTINGS MODAL ══════════ -->
<div class="mbg" id="settModal">
  <div class="md">
    <h3>⚙ 設定</h3>
    <div class="ig"><label>GAS WebApp URL</label><input type="text" id="sUrl" placeholder="https://script.google.com/macros/s/..."></div>
    <div class="mr">
      <button class="btn btn-or" onclick="saveSettings()">保存</button>
      <button class="btn" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════════ */
const GAS_DEFAULT = 'https://script.google.com/macros/s/AKfycbyr775Ax3nrWpb9VDXyJ6ObNCZ3aIgAEaKV0h84InESCAt9oTh6c2jCSNuapDH0J-l8/exec';

let img = null, lastB64 = null;
let cW = 0, cH = 0;
let mode = 'none';
let scalePts = [];
let scaleRatio = null;
// polys: polygon or flood region
let polys = [];
let drag = null;
let caseId = null;
let sides = [];
const FACES = ['東面','西面','南面','北面','前面','裏面'];
let faceIdx = 0;
let drawPts = [];
let drawPolyType = 'wall';
let mousePos = null;
let fillType = 'wall';
let edgeSens = 35;
let tolerance = 25;
let origImgData = null;
let edgeMap = null;
let buildingMask = null;
let buildingPolygon = null;
let base64Image = null;
let _floodCache = null;
let _regionEpoch = 0;
function bumpEpoch() { _regionEpoch++; _floodCache = null; }

let cfg = { gasUrl: localStorage.getItem('r_url') || GAS_DEFAULT };
const HIT = 11;
const CLR = {
  wall:'#FF6B2B', wallF:'rgba(255,107,43,.18)',
  open:'#3b82f6', openF:'rgba(59,130,246,.18)',
  scale:'#FFD700', vx:'#ffffff', vxA:'#FF6B2B',
  drawPt:'#FF6B2B', drawPtFirst:'#FFD700'
};

/* ══════════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════════ */
const mc        = document.getElementById('mc');
const edgeOv    = document.getElementById('edgeOv');
const buildMask = document.getElementById('buildMask');
const ov        = document.getElementById('ov');
const mCtx = mc.getContext('2d');
const eCtx = edgeOv.getContext('2d');
const bCtx = buildMask.getContext('2d');
const oCtx = ov.getContext('2d');

function resize(w, h) {
  [mc, edgeOv, buildMask, ov].forEach(c => {
    c.width = w; c.height = h;
    c.style.width = w+'px'; c.style.height = h+'px';
  });
  cW = w; cH = h;
}

function fitSize(iw, ih) {
  const wrap = document.getElementById('cw');
  const mxW = wrap.clientWidth - 24, mxH = wrap.clientHeight - 24;
  const r = iw / ih;
  let w = mxW, h = mxW / r;
  if (h > mxH) { h = mxH; w = h * r; }
  return { w: Math.round(w), h: Math.round(h) };
}

/* ══════════════════════════════════════════════
   IMAGE LOADING
══════════════════════════════════════════════ */
function handleFile(inp) {
  if (!inp.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const {w, h} = fitSize(img.width, img.height);
      resize(w, h);
      polys = []; scalePts = []; scaleRatio = null; drag = null;
      drawPts = []; mousePos = null;
      origImgData = null; edgeMap = null;
      buildingMask = null; buildingPolygon = null;
      bumpEpoch();
      eCtx.clearRect(0,0,w,h);
      bCtx.clearRect(0,0,w,h);
      hide('maskBadge'); hide('aiResult'); hide('aiError'); hide('aiProgress');
      document.getElementById('aiBtn').disabled = false;
      // compress for AI (max 1024px)
      const apiMax = 1024;
      const apiSc = Math.max(img.width,img.height) > apiMax ? apiMax/Math.max(img.width,img.height) : 1;
      const apiCanvas = document.createElement('canvas');
      apiCanvas.width = Math.round(img.width*apiSc);
      apiCanvas.height = Math.round(img.height*apiSc);
      apiCanvas.getContext('2d').drawImage(img, 0, 0, apiCanvas.width, apiCanvas.height);
      base64Image = apiCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];
      lastB64 = base64Image;
      drawImg();
      origImgData = mCtx.getImageData(0, 0, w, h);
      buildEdgeMap();
      drawOv();
      document.getElementById('rp').style.display = 'none';
      stat('📷 写真を読み込みました。「🤖 AI検出」または「📏 実寸設定」から始めてください。','info');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(inp.files[0]);
}

function drawImg() {
  mCtx.clearRect(0,0,cW,cH);
  if (img) mCtx.drawImage(img, 0, 0, cW, cH);
}

/* ══════════════════════════════════════════════
   AI BUILDING DETECT  (Claude API direct)
══════════════════════════════════════════════ */
function runAIDetect() {
  if (!base64Image) { stat('⚠ 写真をアップロードしてください','warn'); return; }
  const apiKey = document.getElementById('apiKeyInput').value.trim().replace(/[^ -~]/g,'');
  if (!apiKey) {
    showEl('aiError'); document.getElementById('aiError').textContent='APIキーを入力してください。';
    return;
  }
  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  showEl('aiProgress'); hide('aiResult'); hide('aiError');

  const prompt = 'この建物の写真を見て、建物（壁・窓・ドアなどを含む建物全体）の外形輪郭を多角形のポリゴンで返してください。\n\n必ず以下のJSON形式のみで返してください（説明文は不要）:\n{"points":[[x1,y1],[x2,y2],...,[xn,yn]]}\n\nxとyは画像の幅・高さに対する割合（0.0〜1.0）で表してください。建物全体を囲む輪郭を、最低6点・最大30点で表してください。空や地面・木・車などは含めないでください。';

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=' + apiKey;

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { inline_data: { mime_type: 'image/jpeg', data: base64Image } },
          { text: prompt }
        ]
      }],
      generationConfig: { maxOutputTokens: 1000, temperature: 0.1 }
    })
  })
  .then(r => r.json())
  .then(data => {
    hide('aiProgress'); btn.disabled = false;
    if (data.error) {
      document.getElementById('aiError').textContent = 'エラー: '+data.error.message;
      showEl('aiError'); return;
    }
    const text = (data.candidates?.[0]?.content?.parts || []).map(p=>p.text||'').join('');
    const match = text.match(/\{[\s\S]*"points"[\s\S]*\}/);
    if (!match) {
      document.getElementById('aiError').textContent = 'AIの応答を解析できませんでした。再試行してください。';
      showEl('aiError'); return;
    }
    try {
      const parsed = JSON.parse(match[0]);
      if (!parsed.points || parsed.points.length < 3) throw new Error('ポイント数不足');
      const normPts = parsed.points.map(p => ({x: p[0], y: p[1]}));
      buildingPolygon = normPts;
      applyBuildingMask(normPts);
      document.getElementById('aiResult').innerHTML = '✅ 建物を検出しました（'+parsed.points.length+'点）<br>建物外側はクリック不可';
      showEl('aiResult'); showEl('maskBadge');
      stat('✅ AI建物検出完了 — 次に「📏 実寸設定」で2点を指定してください','ok');
    } catch(e) {
      document.getElementById('aiError').textContent = '解析エラー: '+e.message;
      showEl('aiError');
    }
  })
  .catch(e => {
    hide('aiProgress'); btn.disabled = false;
    document.getElementById('aiError').innerHTML = '通信エラー: '+e.message;
    showEl('aiError');
  });
}

/* ══════════════════════════════════════════════
   BUILDING MASK
══════════════════════════════════════════════ */
function applyBuildingMask(normPts) {
  const W=cW, H=cH;
  buildingMask = new Uint8Array(W*H);
  const canvasPts = normPts.map(p => ({x:p.x*W, y:p.y*H}));
  // Rasterize polygon
  const off = document.createElement('canvas'); off.width=W; off.height=H;
  const octx = off.getContext('2d');
  octx.fillStyle = 'white';
  octx.beginPath(); octx.moveTo(canvasPts[0].x, canvasPts[0].y);
  for (let i=1;i<canvasPts.length;i++) octx.lineTo(canvasPts[i].x, canvasPts[i].y);
  octx.closePath(); octx.fill();
  const id = octx.getImageData(0,0,W,H).data;
  for (let j=0;j<W*H;j++) buildingMask[j] = id[j*4+3]>127?1:0;
  renderBuildingMaskCanvas(canvasPts);
}

function renderBuildingMaskCanvas(canvasPts) {
  const W=cW, H=cH;
  bCtx.clearRect(0,0,W,H);
  bCtx.fillStyle = 'rgba(0,0,0,0.42)';
  bCtx.fillRect(0,0,W,H);
  bCtx.globalCompositeOperation = 'destination-out';
  bCtx.beginPath(); bCtx.moveTo(canvasPts[0].x,canvasPts[0].y);
  for (let i=1;i<canvasPts.length;i++) bCtx.lineTo(canvasPts[i].x,canvasPts[i].y);
  bCtx.closePath(); bCtx.fill();
  bCtx.globalCompositeOperation = 'source-over';
  bCtx.beginPath(); bCtx.moveTo(canvasPts[0].x,canvasPts[0].y);
  for (let i=1;i<canvasPts.length;i++) bCtx.lineTo(canvasPts[i].x,canvasPts[i].y);
  bCtx.closePath();
  bCtx.strokeStyle='#a855f7'; bCtx.lineWidth=2.5;
  bCtx.setLineDash([8,4]); bCtx.stroke(); bCtx.setLineDash([]);
}

function rebuildBuildingMask() {
  if (!buildingPolygon) return;
  applyBuildingMask(buildingPolygon);
}

/* ══════════════════════════════════════════════
   EDGE DETECTION  (Sobel)
══════════════════════════════════════════════ */
function buildEdgeMap() {
  if (!origImgData) return;
  const W=cW, H=cH, src=origImgData.data;
  edgeMap = new Float32Array(W*H);
  const lum = (x,y) => { const i=(y*W+x)*4; return 0.299*src[i]+0.587*src[i+1]+0.114*src[i+2]; };
  let maxG = 0;
  for (let y=1;y<H-1;y++) for (let x=1;x<W-1;x++) {
    const gx = -lum(x-1,y-1)-2*lum(x-1,y)-lum(x-1,y+1)+lum(x+1,y-1)+2*lum(x+1,y)+lum(x+1,y+1);
    const gy = -lum(x-1,y-1)-2*lum(x,y-1)-lum(x+1,y-1)+lum(x-1,y+1)+2*lum(x,y+1)+lum(x+1,y+1);
    const mag = Math.sqrt(gx*gx+gy*gy);
    edgeMap[y*W+x] = mag;
    if (mag>maxG) maxG=mag;
  }
  if (maxG>0) for (let i=0;i<edgeMap.length;i++) edgeMap[i]=edgeMap[i]/maxG*255;
  drawEdgeOverlay();
}

function drawEdgeOverlay() {
  const W=cW, H=cH;
  eCtx.clearRect(0,0,W,H);
  if (!edgeMap) return;
  const out = eCtx.createImageData(W,H); const d=out.data;
  for (let i=0;i<W*H;i++) {
    if (edgeMap[i]>edgeSens) {
      const a = Math.min(200, ((edgeMap[i]-edgeSens)/(255-edgeSens))*200);
      d[i*4]=255;d[i*4+1]=255;d[i*4+2]=255;d[i*4+3]=a;
    }
  }
  eCtx.putImageData(out,0,0);
}

function onParamChange() {
  edgeSens  = +document.getElementById('edgeSl').value;
  tolerance = +document.getElementById('tolSl').value;
  document.getElementById('edgeValLbl').textContent = edgeSens;
  document.getElementById('tolValLbl').textContent  = tolerance;
  document.getElementById('edgeSl2').value = edgeSens;
  document.getElementById('edgeV2').textContent = edgeSens;
  document.getElementById('tolSl2').value = tolerance;
  document.getElementById('tolV2').textContent = tolerance;
  if (edgeMap) drawEdgeOverlay();
}
function syncEdge(el) {
  edgeSens = +el.value;
  document.getElementById('edgeSl').value = edgeSens;
  document.getElementById('edgeValLbl').textContent = edgeSens;
  document.getElementById('edgeV2').textContent = edgeSens;

}
function syncTol(el) {

  document.getElementById('tolSl').value = tolerance;
  document.getElementById('tolValLbl').textContent = tolerance;
  document.getElementById('tolV2').textContent = tolerance;
}

/* ══════════════════════════════════════════════
   FLOOD FILL
══════════════════════════════════════════════ */
function doFloodFill(sx, sy) {
  if (!origImgData) return;
  const W=cW, H=cH;
  sx=Math.round(sx); sy=Math.round(sy);
  if (sx<0||sx>=W||sy<0||sy>=H) return;
  if (buildingMask && buildingMask[sy*W+sx]===0) {
    stat('⚠ 建物の外側です。建物内をクリックしてください。','warn'); return;
  }
  const data=origImgData.data;
  const si=(sy*W+sx)*4;
  const tR=data[si],tG=data[si+1],tB=data[si+2];
  const tol3=tolerance*3;
  const mask=new Uint8Array(W*H);
  const stack=new Int32Array(W*H);
  let top=0, pixCount=0;
  mask[sy*W+sx]=255; stack[top++]=sy*W+sx;
  while (top>0) {
    const idx=stack[--top];
    if (mask[idx]===1||mask[idx]===2) continue;
    if (buildingMask && buildingMask[idx]===0) { mask[idx]=2; continue; }
    if (edgeMap && edgeMap[idx]>edgeSens)       { mask[idx]=2; continue; }
    const pi=idx*4;
    const diff=Math.abs(data[pi]-tR)+Math.abs(data[pi+1]-tG)+Math.abs(data[pi+2]-tB);
    if (diff>tol3) { mask[idx]=2; continue; }
    mask[idx]=1; pixCount++;
    const x=idx%W, y=Math.floor(idx/W);
    if (x>0   && !mask[idx-1]) { mask[idx-1]=255; stack[top++]=idx-1; }
    if (x<W-1 && !mask[idx+1]) { mask[idx+1]=255; stack[top++]=idx+1; }
    if (y>0   && !mask[idx-W]) { mask[idx-W]=255; stack[top++]=idx-W; }
    if (y<H-1 && !mask[idx+W]) { mask[idx+W]=255; stack[top++]=idx+W; }
  }
  if (pixCount<50) { stat('⚠ 選択領域が小さすぎます。感度を調整してください。','warn'); return; }
  const n=polys.filter(p=>p.label===fillType).length+1;
  const reg={
    label:fillType, mode:'flood',
    mask, pixCount, W, H,
    seedX:sx, seedY:sy,
    seedColor:[tR,tG,tB], centroid:null
  };
  computeFloodCentroid(reg);
  polys.push(reg);
  bumpEpoch(); drawOv(); updateResult();
  stat('✅ '+(fillType==='wall'?'外壁':'開口')+' #'+n+' を選択（'+pixCount.toLocaleString()+'px）','ok');
}

function computeFloodCentroid(reg) {
  let sx=0,sy=0,cnt=0;
  const step=Math.max(1,Math.floor(reg.W*reg.H/2000));
  for (let i=0;i<reg.W*reg.H;i+=step) {
    if (reg.mask[i]===1) { sx+=i%reg.W; sy+=Math.floor(i/reg.W); cnt++; }
  }
  if (cnt>0) reg.centroid={x:sx/cnt,y:sy/cnt};
}

function buildFloodCache() {
  const W=cW,H=cH;
  const floods=polys.filter(p=>p.mode==='flood'&&p.W===W&&p.H===H);
  const off=document.createElement('canvas'); off.width=W; off.height=H;
  if (!floods.length) { _floodCache={canvas:off,epoch:_regionEpoch,W,H}; return; }
  const octx=off.getContext('2d');
  const out=octx.createImageData(W,H); const d=out.data;
  floods.forEach(reg=>{
    const isW=reg.label==='wall';
    const fR=isW?255:59,fG=isW?107:130,fB=isW?43:246;
    const oR=isW?255:100,oG=isW?180:180,oB=isW?80:255;
    for (let i=0;i<W*H;i++) {
      if (reg.mask[i]!==1) continue;
      const x=i%W,y=Math.floor(i/W);
      const bnd=(x<=1||x>=W-2||y<=1||y>=H-2||
        reg.mask[i-1]!==1||reg.mask[i+1]!==1||
        reg.mask[i-W]!==1||reg.mask[i+W]!==1);
      const pi=i*4;
      if (bnd) { d[pi]=oR;d[pi+1]=oG;d[pi+2]=oB;d[pi+3]=255; }
      else     { d[pi]=fR;d[pi+1]=fG;d[pi+2]=fB;d[pi+3]=55;  }
    }
  });
  octx.putImageData(out,0,0);
  _floodCache={canvas:off,epoch:_regionEpoch,W,H};
}

function drawFloodRegions() {
  const W=cW,H=cH;
  if (!_floodCache||_floodCache.epoch!==_regionEpoch||_floodCache.W!==W||_floodCache.H!==H) buildFloodCache();
  if (_floodCache&&_floodCache.canvas) oCtx.drawImage(_floodCache.canvas,0,0);
  const floods=polys.filter(p=>p.mode==='flood'&&p.W===W&&p.H===H);
  floods.forEach(reg=>{
    if (!reg.centroid||!scaleRatio) return;
    const a=reg.pixCount*scaleRatio*scaleRatio/1e6;
    const lbl=a.toFixed(2)+' m²';
    const cx=reg.centroid.x,cy=reg.centroid.y;
    oCtx.font='bold 14px sans-serif'; oCtx.textAlign='center';
    const tw=oCtx.measureText(lbl).width;
    oCtx.fillStyle=reg.label==='wall'?'rgba(160,50,0,.93)':'rgba(20,60,160,.93)';
    oCtx.beginPath();
    if (oCtx.roundRect) oCtx.roundRect(cx-tw/2-7,cy-12,tw+14,24,6);
    else oCtx.rect(cx-tw/2-7,cy-12,tw+14,24);
    oCtx.fill();
    oCtx.fillStyle='#fff'; oCtx.fillText(lbl,cx,cy+5); oCtx.textAlign='left';
  });
}

/* ══════════════════════════════════════════════
   OVERLAY RENDERING
══════════════════════════════════════════════ */
function drawOv() {
  oCtx.clearRect(0,0,cW,cH);
  drawFloodRegions();

  // Scale line
  if (scalePts.length>0) {
    scalePts.forEach(p=>{
      oCtx.fillStyle=CLR.scale;
      oCtx.beginPath(); oCtx.arc(p.x,p.y,5,0,Math.PI*2); oCtx.fill();
    });
    if (scalePts.length===2) {
      oCtx.strokeStyle=CLR.scale; oCtx.lineWidth=2.5; oCtx.setLineDash([8,4]);
      oCtx.beginPath(); oCtx.moveTo(scalePts[0].x,scalePts[0].y); oCtx.lineTo(scalePts[1].x,scalePts[1].y);
      oCtx.stroke(); oCtx.setLineDash([]);
      const mx=(scalePts[0].x+scalePts[1].x)/2,my=(scalePts[0].y+scalePts[1].y)/2;
      const mm=parseFloat(document.getElementById('realMm').value)||1800;
      oCtx.fillStyle=CLR.scale; oCtx.font='bold 13px sans-serif'; oCtx.textAlign='center';
      oCtx.fillText(mm+' mm',mx,my-10); oCtx.textAlign='left';
    }
  }

  // Polygon regions
  polys.forEach((poly,pi)=>{
    if (poly.mode!=='polygon'||poly.points.length<3) return;
    const isW=poly.label==='wall';
    const sc=isW?CLR.wall:CLR.open;
    const fc=isW?CLR.wallF:CLR.openF;
    oCtx.beginPath(); oCtx.moveTo(poly.points[0].x,poly.points[0].y);
    poly.points.forEach((p,i)=>{ if(i>0) oCtx.lineTo(p.x,p.y); });
    oCtx.closePath();
    oCtx.fillStyle=fc; oCtx.fill();
    oCtx.strokeStyle=sc; oCtx.lineWidth=2.5; oCtx.stroke();
    const cx=poly.points.reduce((s,p)=>s+p.x,0)/poly.points.length;
    const cy=poly.points.reduce((s,p)=>s+p.y,0)/poly.points.length;
    if (scaleRatio) {
      const a=shoelace(poly.points)*scaleRatio*scaleRatio/1e6;
      const lbl=a.toFixed(2)+' m²';
      oCtx.font='bold 14px sans-serif'; oCtx.textAlign='center';
      const tw=oCtx.measureText(lbl).width;
      oCtx.fillStyle=isW?'rgba(160,50,0,.93)':'rgba(20,60,160,.93)';
      oCtx.beginPath();
      if (oCtx.roundRect) oCtx.roundRect(cx-tw/2-7,cy-12,tw+14,24,6);
      else oCtx.rect(cx-tw/2-7,cy-12,tw+14,24);
      oCtx.fill();
      oCtx.fillStyle='#fff'; oCtx.fillText(lbl,cx,cy+5); oCtx.textAlign='left';
    }
    if (mode==='adjust') {
      poly.points.forEach((p,vi)=>{
        const isD=drag&&drag.pi===pi&&drag.vi===vi;
        oCtx.fillStyle=isD?CLR.vxA:CLR.vx;
        oCtx.strokeStyle=sc; oCtx.lineWidth=2.5;
        oCtx.beginPath(); oCtx.arc(p.x,p.y,isD?8:6,0,Math.PI*2); oCtx.fill(); oCtx.stroke();
      });
    }
  });

  // In-progress draw polygon
  if (drawPts.length>0) {
    const sc=drawPolyType==='wall'?CLR.wall:CLR.open;
    const fc=drawPolyType==='wall'?CLR.wallF:CLR.openF;
    oCtx.save();
    if (drawPts.length>=3) {
      oCtx.beginPath(); oCtx.moveTo(drawPts[0].x,drawPts[0].y);
      drawPts.forEach((p,i)=>{ if(i>0) oCtx.lineTo(p.x,p.y); });
      oCtx.closePath(); oCtx.fillStyle=fc; oCtx.fill();
    }
    if (drawPts.length>1) {
      oCtx.beginPath(); oCtx.moveTo(drawPts[0].x,drawPts[0].y);
      drawPts.forEach((p,i)=>{ if(i>0) oCtx.lineTo(p.x,p.y); });
      oCtx.strokeStyle=sc; oCtx.lineWidth=2; oCtx.setLineDash([]); oCtx.stroke();
    }
    if (mousePos) {
      const last=drawPts[drawPts.length-1];
      oCtx.beginPath(); oCtx.moveTo(last.x,last.y); oCtx.lineTo(mousePos.x,mousePos.y);
      oCtx.strokeStyle=sc; oCtx.lineWidth=1.5; oCtx.setLineDash([5,5]); oCtx.stroke(); oCtx.setLineDash([]);
      if (drawPts.length>=2) {
        oCtx.beginPath(); oCtx.moveTo(mousePos.x,mousePos.y); oCtx.lineTo(drawPts[0].x,drawPts[0].y);
        oCtx.globalAlpha=0.3; oCtx.setLineDash([3,6]); oCtx.stroke(); oCtx.setLineDash([]); oCtx.globalAlpha=1;
      }
    }
    const firstNear=mousePos&&drawPts.length>=3&&Math.hypot(mousePos.x-drawPts[0].x,mousePos.y-drawPts[0].y)<15;
    drawPts.forEach((p,i)=>{
      const isFirst=i===0;
      const r=isFirst?(firstNear?10:7):5;
      oCtx.fillStyle=isFirst?CLR.drawPtFirst:CLR.vx;
      oCtx.strokeStyle=isFirst?(firstNear?'#fff':CLR.drawPtFirst):sc; oCtx.lineWidth=isFirst?2.5:2;
      oCtx.beginPath(); oCtx.arc(p.x,p.y,r,0,Math.PI*2); oCtx.fill(); oCtx.stroke();
      oCtx.fillStyle=isFirst?'#000':'#fff'; oCtx.font='bold 9px sans-serif'; oCtx.textAlign='center';
      oCtx.fillText(i+1,p.x,p.y+3.5); oCtx.textAlign='left';
    });
    if (firstNear) {
      oCtx.font='bold 11px sans-serif'; oCtx.textAlign='center';
      oCtx.fillStyle='rgba(0,0,0,.7)'; oCtx.fillRect(drawPts[0].x-50,drawPts[0].y-28,100,18);
      oCtx.fillStyle=CLR.drawPtFirst; oCtx.fillText('クリックで確定',drawPts[0].x,drawPts[0].y-14);
      oCtx.textAlign='left';
    }
    oCtx.restore();
  }
}

/* ══════════════════════════════════════════════
   MODE MANAGEMENT
══════════════════════════════════════════════ */
function setMode(m) {
  if (mode==='draw'&&m!=='draw') {
    drawPts=[]; mousePos=null;
    document.getElementById('btnConfirm').style.display='none';
  }
  mode=(mode===m)?'none':m;
  document.getElementById('btnSc').classList.toggle('on',mode==='scale');
  document.getElementById('btnAd').classList.toggle('on',mode==='adjust');
  document.getElementById('btnDr').classList.toggle('on',mode==='draw');
  document.getElementById('btnFl').classList.toggle('on',mode==='fill');
  document.getElementById('scRow').style.display    = mode==='scale'?'flex':'none';
  document.getElementById('drawCtrl').style.display = mode==='draw'?'flex':'none';
  document.getElementById('fillCtrl').style.display = mode==='fill'?'flex':'none';
  ov.style.cursor=(mode==='scale'||mode==='draw'||mode==='fill')?'crosshair':'default';
  if      (mode==='scale')  stat('📏 基準となる2点をクリック（例：サッシ幅・既知の長さ）','info');
  else if (mode==='adjust') stat('🖱 白い円をドラッグして頂点を調整','info');
  else if (mode==='draw')   stat('✏️ クリックで頂点を追加 — 3点以上で✅確定','info');
  else if (mode==='fill')   stat('🎯 外壁や開口の中心をクリック','info');
  else stat('');
  drawOv();
}

function setDrawType(t) {
  drawPolyType=t;
  document.getElementById('dtWall').className='dt-btn'+(t==='wall'?' wall-on':'');
  document.getElementById('dtOpen').className='dt-btn'+(t==='opening'?' open-on':'');
  drawOv();
}

function setFillType(t) {
  fillType=t;
  document.getElementById('ftWall').className='dt-btn'+(t==='wall'?' wall-on':'');
  document.getElementById('ftOpen').className='dt-btn'+(t==='opening'?' open-on':'');
}

function confirmDrawPoly() {
  if (drawPts.length<3) return;
  polys.push({label:drawPolyType, mode:'polygon', points:drawPts.map(p=>({x:p.x,y:p.y}))});
  const n=polys.filter(p=>p.label===drawPolyType&&p.mode==='polygon').length;
  drawPts=[]; mousePos=null;
  document.getElementById('btnConfirm').style.display='none';
  bumpEpoch(); drawOv(); updateResult();
  stat('✅ '+(drawPolyType==='wall'?'外壁':'開口')+' #'+n+' を追加しました','ok');
}

function cancelDraw() {
  drawPts=[]; mousePos=null;
  document.getElementById('btnConfirm').style.display='none';
  drawOv(); stat('✏️ ポリゴン作成をキャンセル','info');
}

function undoLast() {
  if (mode==='draw'&&drawPts.length>0) {
    drawPts.pop();
    if (drawPts.length<3) document.getElementById('btnConfirm').style.display='none';
    drawOv(); stat('↩ 最後の頂点を取り消しました',''); return;
  }
  if (polys.length>0) { polys.pop(); bumpEpoch(); drawOv(); updateResult(); stat('↩ 最後の領域を削除しました',''); }
}

/* ══════════════════════════════════════════════
   POINTER EVENTS
══════════════════════════════════════════════ */
function getPt(e) {
  const r=ov.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left)*ov.width/r.width, y:(cy-r.top)*ov.height/r.height};
}

function hitTest(pos) {
  for (let pi=polys.length-1;pi>=0;pi--) {
    if (polys[pi].mode!=='polygon') continue;
    for (let vi=0;vi<polys[pi].points.length;vi++) {
      const p=polys[pi].points[vi];
      if (Math.hypot(p.x-pos.x,p.y-pos.y)<=HIT) return {pi,vi};
    }
  }
  return null;
}

function onDown(e) {
  if (!img) return;
  const pos=getPt(e);
  if (mode==='scale') {
    if (scalePts.length>=2) scalePts=[];
    scalePts.push(pos);
    if (scalePts.length===2) calcScale();
    drawOv();
  } else if (mode==='adjust') {
    drag=hitTest(pos);
    if (drag) ov.style.cursor='grabbing';
  } else if (mode==='draw') {
    if (drawPts.length>=3) {
      const f=drawPts[0];
      if (Math.hypot(pos.x-f.x,pos.y-f.y)<15) { confirmDrawPoly(); return; }
    }
    drawPts.push({x:pos.x,y:pos.y});
    if (drawPts.length>=3) document.getElementById('btnConfirm').style.display='';
    drawOv();
  } else if (mode==='fill') {
    doFloodFill(pos.x, pos.y);
  }
}

function onMove(e) {
  if (!img) return;
  const pos=getPt(e);
  if (mode==='adjust') {
    if (drag) { polys[drag.pi].points[drag.vi]=pos; drawOv(); updateResult(); }
    else ov.style.cursor=hitTest(pos)?'grab':'default';
  } else if (mode==='draw') {
    mousePos=pos;
    if (drawPts.length>=3) {
      const f=drawPts[0];
      ov.style.cursor=Math.hypot(pos.x-f.x,pos.y-f.y)<15?'pointer':'crosshair';
    }
    drawOv();
  }
}

function onUp() {
  if (drag) { drag=null; ov.style.cursor='default'; drawOv(); updateResult(); }
}

ov.addEventListener('mousedown',onDown);
ov.addEventListener('mousemove',onMove);
ov.addEventListener('mouseup',onUp);
ov.addEventListener('mouseleave',e=>{ if(mode==='draw'){mousePos=null;drawOv();} onUp(); });
ov.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
ov.addEventListener('touchmove', e=>{e.preventDefault();onMove(e);},{passive:false});
ov.addEventListener('touchend',  e=>{e.preventDefault();onUp(e);  },{passive:false});

/* ══════════════════════════════════════════════
   SCALE CALIBRATION
══════════════════════════════════════════════ */
function calcScale() {
  const p=scalePts;
  const d=Math.hypot(p[1].x-p[0].x,p[1].y-p[0].y);
  if (d<2) { stat('⚠ 2点が近すぎます。離れた2点を指定してください。','warn'); return; }
  const mm=parseFloat(document.getElementById('realMm').value)||1800;
  scaleRatio=mm/d;
  stat('✅ 実寸設定完了 — 1px ≒ '+scaleRatio.toFixed(3)+' mm','ok');
  drawOv(); updateResult();
}
document.getElementById('realMm').addEventListener('input',()=>{ if(scalePts.length===2) calcScale(); });

/* ══════════════════════════════════════════════
   AREA CALCULATION
══════════════════════════════════════════════ */
function shoelace(pts) {
  let a=0; const n=pts.length;
  for (let i=0;i<n;i++) { const j=(i+1)%n; a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y; }
  return Math.abs(a)/2;
}

function px2m2(px2) { return scaleRatio?px2*scaleRatio*scaleRatio/1e6:null; }

function calcAreas() {
  let wPx=0,oPx=0,wFlood=0,oFlood=0;
  polys.forEach(p=>{
    if (p.mode==='polygon'&&p.points.length>=3) {
      const a=shoelace(p.points);
      p.label==='wall'?(wPx+=a):(oPx+=a);
    } else if (p.mode==='flood') {
      p.label==='wall'?(wFlood+=p.pixCount):(oFlood+=p.pixCount);
    }
  });
  const wM=(px2m2(wPx)||0)+(scaleRatio?wFlood*scaleRatio*scaleRatio/1e6:0);
  const oM=(px2m2(oPx)||0)+(scaleRatio?oFlood*scaleRatio*scaleRatio/1e6:0);
  const nM=Math.max(0,wM-oM);
  return {wM,oM,nM};
}

function updateResult() {
  const rp=document.getElementById('rp');
  if (!polys.length) { rp.style.display='none'; return; }
  rp.style.display='block';
  const {wM,oM,nM}=calcAreas();
  if (scaleRatio) {
    document.getElementById('rpV').textContent=nM.toFixed(2);
    document.getElementById('rpD').innerHTML='外壁: '+wM.toFixed(2)+' m²<br>開口: '+oM.toFixed(2)+' m²';
  } else {
    document.getElementById('rpV').textContent='—';
    document.getElementById('rpD').textContent='実寸設定が必要です';
  }
}

/* ══════════════════════════════════════════════
   CASE MANAGEMENT
══════════════════════════════════════════════ */
async function initCase() {
  const code=document.getElementById('opCode').value.trim();
  const name=document.getElementById('clName').value.trim();
  if (!code||!name) { stat('⚠ 事業者コードと依頼主名を入力してください','warn'); return; }
  const seq=String(Date.now()).slice(-4);
  caseId=code+'-'+new Date().getFullYear()+'-'+name+'-'+seq;
  sides=[]; faceIdx=0;
  document.getElementById('cbadge').textContent=caseId;
  renderSides();
  try {
    const addr=document.getElementById('addr').value.trim();
    const r=await gas({action:'saveCase',caseId,operator:code,client:name,address:addr});
    stat(r.result==='success'?'✅ 案件登録完了: '+caseId:'⚠ GAS登録失敗: '+(r.message||''),r.result==='success'?'ok':'warn');
  } catch(e) { stat('✅ 案件をローカルに設定しました（GAS未接続）','ok'); }
}

/* ══════════════════════════════════════════════
   FACE RECORDING
══════════════════════════════════════════════ */
async function recordFace() {
  if (!caseId)       { stat('⚠ 案件を登録してください','warn'); return; }
  if (!polys.length) { stat('⚠ 領域を選択してください（スマート選択またはポリゴン作成）','warn'); return; }
  if (!scaleRatio)   { stat('⚠ 「📏 実寸設定」を先に完了してください','warn'); return; }
  const {wM,oM,nM}=calcAreas();
  const fn=document.getElementById('faceName').value.trim()||FACES[faceIdx]||'撮影面';
  sides.push({fn,net:nM,wall:wM,open:oM,sr:scaleRatio});
  faceIdx++;
  if (FACES[faceIdx]) document.getElementById('faceName').value=FACES[faceIdx];
  renderSides();
  try {
    await gas({action:'saveRecord',caseId,sideName:fn,netArea:nM.toFixed(4),wallArea:wM.toFixed(4),openingArea:oM.toFixed(4),scaleRatio:scaleRatio.toFixed(4)});
    stat('✅ 「'+fn+'」記録完了 — 純塗装面積: '+nM.toFixed(2)+' m²','ok');
  } catch(e) { stat('✅ 「'+fn+'」ローカル記録済み（GAS保存エラー）','ok'); }
}

function renderSides() {
  const el=document.getElementById('sideList'); el.innerHTML=''; let tot=0;
  sides.forEach(r=>{
    tot+=r.net;
    const d=document.createElement('div'); d.className='sc-card';
    d.innerHTML='<div class="fn">'+r.fn+'</div><div class="fa">'+r.net.toFixed(2)+'<span style="font-size:12px;color:#555"> m²</span></div><div class="fd">外壁 '+r.wall.toFixed(2)+' / 開口 '+r.open.toFixed(2)+' m²</div>';
    el.appendChild(d);
  });
  document.getElementById('totRow').style.display=sides.length?'flex':'none';
  document.getElementById('totVal').textContent=tot.toFixed(2);
  document.getElementById('totUnit').textContent=sides.length?'m²':'';
}

/* ══════════════════════════════════════════════
   GAS COMMUNICATION
══════════════════════════════════════════════ */
async function gas(data) {
  const url=cfg.gasUrl||GAS_DEFAULT;
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

/* ══════════════════════════════════════════════
   STATUS BAR
══════════════════════════════════════════════ */
let stTimer=null;
function stat(msg,type='') {
  const el=document.getElementById('st');
  el.textContent=msg; el.className='st'+(type?' '+type:'');
  el.style.display=msg?'block':'none';
  clearTimeout(stTimer);
  if (type==='ok') stTimer=setTimeout(()=>stat(''),7000);
}

/* ══════════════════════════════════════════════
   WINDOW RESIZE
══════════════════════════════════════════════ */
window.addEventListener('resize',()=>{
  if (!img) return;
  const {w,h}=fitSize(img.width,img.height);
  if (w===cW&&h===cH) return;
  const sx=w/cW,sy=h/cH;
  polys.forEach(poly=>{
    if (poly.mode==='polygon') poly.points.forEach(p=>{ p.x*=sx; p.y*=sy; });
    else if (poly.mode==='flood') poly._refill={sx:poly.seedX*sx,sy:poly.seedY*sy,label:poly.label};
  });
  scalePts.forEach(p=>{ p.x*=sx; p.y*=sy; });
  drawPts.forEach(p=>{ p.x*=sx; p.y*=sy; });
  const refills=polys.filter(p=>p.mode==='flood').map(p=>p._refill).filter(Boolean);
  polys=polys.filter(p=>p.mode!=='polygon'); // keep polygons scaled
  // actually keep all polygons, just refill floods
  bumpEpoch();
  resize(w,h);
  drawImg();
  origImgData=mCtx.getImageData(0,0,w,h);
  buildEdgeMap();
  if (buildingPolygon) rebuildBuildingMask();
  if (scalePts.length===2) calcScale(); else drawOv();
  updateResult();
  if (refills.length) {
    const savedFill=fillType;
    refills.forEach(rf=>{ fillType=rf.label; doFloodFill(Math.round(rf.sx),Math.round(rf.sy)); });
    fillType=savedFill;
  }
});
</script>
