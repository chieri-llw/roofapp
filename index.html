<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外壁積算 Pro v15.1</title>
<style>
:root{--bg:#0a0c10;--or:#FF6B2B;--bl:#3b82f6;--gn:#22c55e;--bd:#252830;--card:#111318;--in:#070910}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:#e2e4e9;display:flex;height:100vh;overflow:hidden}
/* ── SIDEBAR ── */
.sb{width:264px;min-width:264px;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.sb-s{flex:1;overflow-y:auto;padding:14px}
.sb-f{padding:11px 14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:7px}
.sec{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 6px;font-weight:700}
.sec:first-child{margin-top:0}
/* inputs */
input[type=text],input[type=password],input[type=number]{width:100%;background:var(--in);border:1px solid #2e3140;color:#e8eaf0;padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--or)}
/* buttons */
.btn{padding:8px 13px;border-radius:6px;border:1px solid #3a3d48;background:#191c26;color:#bbb;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;transition:background .15s,color .15s}
.btn:hover{background:#252830;color:#fff}
.btn.on{background:#fff;color:#000;border-color:#fff}
.btn-or{background:var(--or);border:none;color:#fff}.btn-or:hover{background:#e55c20}
.btn-bl{background:var(--bl);border:none;color:#fff}.btn-bl:hover{background:#2563eb}
.btn-gn{background:var(--gn);border:none;color:#fff}.btn-gn:hover{background:#16a34a}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-f{width:100%;display:block}
/* case badge */
.cbadge{background:var(--in);border:1px solid #FF6B2B33;border-radius:6px;padding:8px 10px;text-align:center;color:var(--or);font-weight:700;font-size:12px;min-height:32px;display:flex;align-items:center;justify-content:center;word-break:break-all;margin-top:6px;letter-spacing:.5px}
/* side cards */
.sc{background:#181b24;border:1px solid var(--bd);border-left:3px solid var(--bl);border-radius:6px;padding:9px 11px;margin-bottom:6px}
.sc .fn{font-weight:700;font-size:12px;color:#dde}
.sc .fa{font-size:19px;color:var(--or);font-weight:700;margin:2px 0}
.sc .fd{font-size:11px;color:#555}
.tot{display:flex;justify-content:space-between;align-items:center;background:#181b24;border:1px solid #FF6B2B2a;border-radius:6px;padding:8px 11px;margin-top:8px}
.tot-v{font-size:22px;font-weight:700;color:var(--or)}.tot-l{font-size:11px;color:#666}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.tb{height:auto;min-height:54px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;overflow-x:auto;flex-wrap:wrap;padding:6px 10px}
.sep{width:1px;height:26px;background:var(--bd);flex-shrink:0}
/* canvas wrap */
.cw{flex:1;position:relative;overflow:hidden;background:#040507;display:flex;align-items:center;justify-content:center}
canvas{position:absolute;touch-action:none}
#ov{z-index:2}
/* result panel */
.rp{position:absolute;bottom:14px;right:14px;background:rgba(4,5,7,.93);border:1px solid var(--or);border-radius:10px;padding:13px 17px;min-width:148px;text-align:right;z-index:10;display:none;backdrop-filter:blur(4px)}
.rp-v{font-size:34px;font-weight:700;color:var(--or);line-height:1}
.rp-u{font-size:11px;color:#666;margin-top:2px}
.rp-d{font-size:11px;color:#555;margin-top:8px;line-height:1.7}
/* status */
.st{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(4,5,7,.92);border:1px solid #333;border-radius:8px;padding:6px 14px;font-size:12px;color:#777;z-index:10;white-space:nowrap;pointer-events:none;display:none}
.st.info{border-color:var(--bl);color:#60a5fa}
.st.ok{border-color:var(--gn);color:#4ade80}
.st.err{border-color:#ef4444;color:#f87171}
.st.warn{border-color:#f59e0b;color:#fbbf24}
/* scale row */
.sc-row{display:none;align-items:center;gap:5px}
.sc-row input{width:68px}
.sc-row span{font-size:12px;color:#666}
/* draw controls */
.draw-ctrl{display:none;align-items:center;gap:4px;flex-shrink:0}
.dt-btn{padding:5px 8px;border-radius:6px;border:1px solid #3a3d48;background:#191c26;color:#555;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;transition:all .15s}
.dt-btn.wall-on{background:#2a0e00;border-color:var(--or);color:var(--or)}
.dt-btn.open-on{background:#071a38;border-color:var(--bl);color:var(--bl)}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:center;justify-content:center}
.mbg.open{display:flex}
.md{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px;width:380px;max-width:92vw}
.md h3{color:var(--or);margin-bottom:14px;font-size:15px}
.md .ig{margin-bottom:11px}.md .ig label{font-size:11px;color:#777;display:block;margin-bottom:3px}
.md .mr{display:flex;gap:8px;margin-top:14px}.md .mr .btn{flex:1}
/* spinner */
@keyframes sp{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;vertical-align:middle;margin-right:5px}
/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2d38;border-radius:2px}
/* flex helpers */
.row{display:flex;gap:6px;align-items:center}.row input{flex:1}
</style>
</head>
<body>

<!-- ══════════ SIDEBAR ══════════ -->
<div class="sb">
  <div class="sb-s">
    <div class="sec">案件情報</div>
    <div class="row" style="margin-bottom:6px">
      <input type="text" id="opCode" placeholder="コード (NK)" style="width:80px;flex:none">
      <input type="text" id="clName" placeholder="依頼主名">
    </div>
    <input type="text" id="addr" placeholder="住所（任意）" style="margin-bottom:8px">
    <button class="btn btn-or btn-f" onclick="initCase()">案件を新規登録</button>
    <div class="cbadge" id="cbadge">— 案件未登録 —</div>

    <div class="sec">撮影面リスト</div>
    <div id="sideList"></div>
    <div class="tot" id="totRow" style="display:none">
      <span class="tot-l">合計 純塗装面積</span>
      <span class="tot-v" id="totVal">0.00</span>
    </div>
    <div style="font-size:10px;color:#444;text-align:right;margin-top:2px" id="totUnit"></div>
  </div>

  <div class="sb-f">
    <div>
      <div style="font-size:11px;color:#777;margin-bottom:3px">撮影面名称</div>
      <div class="row">
        <input type="text" id="faceName" value="東面">
        <button class="btn btn-sm btn-bl" onclick="recordFace()">📋 記録</button>
      </div>
    </div>
    <button class="btn btn-sm btn-f" onclick="openSettings()">⚙ 設定（APIキー・GAS URL）</button>
  </div>
</div>

<!-- ══════════ MAIN ══════════ -->
<div class="main">
  <div class="tb">
    <input type="file" id="fi" style="display:none" accept="image/*" onchange="handleFile(this)">
    <button class="btn" onclick="document.getElementById('fi').click()">📷 写真</button>
    <div class="sep"></div>
    <button id="btnSc" class="btn" onclick="setMode('scale')">📏 実寸設定</button>
    <div class="sc-row" id="scRow">
      <input type="number" id="realMm" value="1800" min="1">
      <span>mm</span>
    </div>
    <div class="sep"></div>
    <button id="btnAd" class="btn" onclick="setMode('adjust')">🖱 頂点修正</button>
    <div class="sep"></div>
    <button id="btnDr" class="btn" onclick="setMode('draw')">✏️ ポリゴン作成</button>
    <div class="draw-ctrl" id="drawCtrl">
      <button class="dt-btn wall-on" id="dtWall" onclick="setDrawType('wall')">🟠 外壁</button>
      <button class="dt-btn" id="dtOpen" onclick="setDrawType('opening')">🟢 開口</button>
      <button class="btn btn-sm btn-gn" id="btnConfirm" onclick="confirmDrawPoly()" style="display:none">✅ 確定</button>
      <button class="btn btn-sm" onclick="cancelDraw()" style="color:#f87171;border-color:#f87171">✕ 取消</button>
    </div>
    <div class="sep"></div>
    <button class="btn btn-or" id="aiBtn" onclick="runAI()">✨ AI解析</button>
    <button class="btn btn-sm" onclick="undoLast()" title="最後の頂点/ポリゴンを取り消し" style="color:#aaa">↩ 戻す</button>
    <button class="btn btn-sm" onclick="doClear()" style="color:#555" title="全リセット">🗑 全消去</button>
  </div>

  <div class="cw" id="cw">
    <canvas id="mc"></canvas>
    <canvas id="ov"></canvas>
  </div>

  <div class="rp" id="rp">
    <div class="rp-v" id="rpV">—</div>
    <div class="rp-u">純塗装面積 m²</div>
    <div class="rp-d" id="rpD"></div>
  </div>

  <div class="st" id="st"></div>
</div>

<!-- ══════════ SETTINGS MODAL ══════════ -->
<div class="mbg" id="settModal">
  <div class="md">
    <h3>⚙ 設定</h3>
    <div class="ig"><label>Gemini API Key</label><input type="password" id="sKey" placeholder="AIzaSy..."></div>
    <div class="ig"><label>GAS WebApp URL</label><input type="text" id="sUrl" placeholder="https://script.google.com/macros/s/..."></div>
    <div class="mr">
      <button class="btn btn-or" onclick="saveSettings()">保存</button>
      <button class="btn" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<script>
const GAS_DEFAULT = 'https://script.google.com/macros/s/AKfycbyr775Ax3nrWpb9VDXyJ6ObNCZ3aIgAEaKV0h84InESCAt9oTh6c2jCSNuapDH0J-l8/exec';

let img = null, lastB64 = null;
let cW = 0, cH = 0;
let mode = 'none';
let scalePts = [];
let scaleRatio = null;
let polys = [];
let drag = null;
let caseId = null;
let sides = [];
const FACES = ['東面','西面','南面','北面','前面','裏面'];
let faceIdx = 0;

let drawPts = [];
let drawPolyType = 'wall';
let mousePos = null;

let cfg = {
  apiKey: localStorage.getItem('r_key') || '',
  gasUrl: localStorage.getItem('r_url') || GAS_DEFAULT
};

const HIT = 11;
const CLR = {
  wall: '#FF6B2B', wallF: 'rgba(255,107,43,.18)',
  open: '#3b82f6', openF: 'rgba(59,130,246,.18)',
  scale: '#FFD700', vx: '#ffffff', vxA: '#FF6B2B',
  drawPt: '#FF6B2B', drawPtFirst: '#FFD700'
};

const mc = document.getElementById('mc');
const ov = document.getElementById('ov');
const mCtx = mc.getContext('2d');
const oCtx = ov.getContext('2d');

function resize(w, h) {
  mc.width = ov.width = w;
  mc.height = ov.height = h;
  mc.style.width = ov.style.width = w + 'px';
  mc.style.height = ov.style.height = h + 'px';
  cW = w; cH = h;
}

function fitSize(iw, ih) {
  const wrap = document.getElementById('cw');
  const mxW = wrap.clientWidth - 24, mxH = wrap.clientHeight - 24;
  const r = iw / ih;
  let w = mxW, h = mxW / r;
  if (h > mxH) { h = mxH; w = h * r; }
  return { w: Math.round(w), h: Math.round(h) };
}

function handleFile(inp) {
  if (!inp.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const { w, h } = fitSize(img.width, img.height);
      resize(w, h);
      polys = []; scalePts = []; scaleRatio = null; drag = null;
      drawPts = []; mousePos = null;
      lastB64 = compress(img);
      drawImg(); drawOv();
      document.getElementById('rp').style.display = 'none';
      stat('📷 写真を読み込みました。まず「📏 実寸設定」で2点を指定してください。', 'info');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(inp.files[0]);
}

function compress(im, maxW = 1280) {
  const tc = document.createElement('canvas');
  const r = im.width / im.height;
  const w = Math.min(im.width, maxW), h = Math.round(w / r);
  tc.width = w; tc.height = h;
  tc.getContext('2d').drawImage(im, 0, 0, w, h);
  return tc.toDataURL('image/jpeg', 0.78).split(',')[1];
}

function drawImg() {
  mCtx.clearRect(0, 0, cW, cH);
  if (img) mCtx.drawImage(img, 0, 0, cW, cH);
}

function drawOv() {
  oCtx.clearRect(0, 0, cW, cH);

  if (scalePts.length > 0) {
    scalePts.forEach(p => {
      oCtx.fillStyle = CLR.scale;
      oCtx.beginPath(); oCtx.arc(p.x, p.y, 5, 0, Math.PI * 2); oCtx.fill();
    });
    if (scalePts.length === 2) {
      oCtx.strokeStyle = CLR.scale; oCtx.lineWidth = 2.5; oCtx.setLineDash([8, 4]);
      oCtx.beginPath();
      oCtx.moveTo(scalePts[0].x, scalePts[0].y);
      oCtx.lineTo(scalePts[1].x, scalePts[1].y);
      oCtx.stroke(); oCtx.setLineDash([]);
      const mx = (scalePts[0].x + scalePts[1].x) / 2;
      const my = (scalePts[0].y + scalePts[1].y) / 2;
      const mm = parseFloat(document.getElementById('realMm').value) || 1800;
      oCtx.fillStyle = CLR.scale;
      oCtx.font = 'bold 13px sans-serif'; oCtx.textAlign = 'center';
      oCtx.fillText(mm + ' mm', mx, my - 10);
      if (scaleRatio) {
        oCtx.fillStyle = '#aaa'; oCtx.font = '10px sans-serif';
        oCtx.fillText('(' + scaleRatio.toFixed(3) + ' mm/px)', mx, my + 16);
      }
      oCtx.textAlign = 'left';
    }
  }

  polys.forEach((poly, pi) => {
    if (poly.points.length < 3) return;
    const isW = poly.label === 'wall';
    const sc = isW ? CLR.wall : CLR.open;
    const fc = isW ? CLR.wallF : CLR.openF;
    oCtx.beginPath();
    oCtx.moveTo(poly.points[0].x, poly.points[0].y);
    poly.points.forEach((p, i) => { if (i > 0) oCtx.lineTo(p.x, p.y); });
    oCtx.closePath();
    oCtx.fillStyle = fc; oCtx.fill();
    oCtx.strokeStyle = sc; oCtx.lineWidth = 2.5; oCtx.stroke();
    const cx = poly.points.reduce((s, p) => s + p.x, 0) / poly.points.length;
    const cy = poly.points.reduce((s, p) => s + p.y, 0) / poly.points.length;
    oCtx.font = 'bold 14px sans-serif'; oCtx.textAlign = 'center';
    oCtx.shadowColor = 'rgba(0,0,0,.8)'; oCtx.shadowBlur = 5;
    oCtx.fillStyle = sc;
    oCtx.fillText(isW ? '壁' : '開口', cx, cy + 5);
    oCtx.shadowBlur = 0; oCtx.textAlign = 'left';
    if (mode === 'adjust') {
      poly.points.forEach((p, vi) => {
        const isD = drag && drag.pi === pi && drag.vi === vi;
        oCtx.fillStyle = isD ? CLR.vxA : CLR.vx;
        oCtx.strokeStyle = sc; oCtx.lineWidth = 2.5;
        oCtx.beginPath(); oCtx.arc(p.x, p.y, isD ? 8 : 6, 0, Math.PI * 2);
        oCtx.fill(); oCtx.stroke();
      });
    }
  });

  if (drawPts.length > 0) {
    const sc = drawPolyType === 'wall' ? CLR.wall : CLR.open;
    const fc = drawPolyType === 'wall' ? CLR.wallF : CLR.openF;
    oCtx.save();
    if (drawPts.length >= 3) {
      oCtx.beginPath();
      oCtx.moveTo(drawPts[0].x, drawPts[0].y);
      drawPts.forEach((p, i) => { if (i > 0) oCtx.lineTo(p.x, p.y); });
      oCtx.closePath();
      oCtx.fillStyle = fc; oCtx.fill();
    }
    if (drawPts.length > 1) {
      oCtx.beginPath();
      oCtx.moveTo(drawPts[0].x, drawPts[0].y);
      drawPts.forEach((p, i) => { if (i > 0) oCtx.lineTo(p.x, p.y); });
      oCtx.strokeStyle = sc; oCtx.lineWidth = 2; oCtx.setLineDash([]); oCtx.stroke();
    }
    if (mousePos) {
      const last = drawPts[drawPts.length - 1];
      oCtx.beginPath();
      oCtx.moveTo(last.x, last.y);
      oCtx.lineTo(mousePos.x, mousePos.y);
      oCtx.strokeStyle = sc; oCtx.lineWidth = 1.5; oCtx.setLineDash([5, 5]); oCtx.stroke(); oCtx.setLineDash([]);
      if (drawPts.length >= 2) {
        oCtx.beginPath();
        oCtx.moveTo(mousePos.x, mousePos.y);
        oCtx.lineTo(drawPts[0].x, drawPts[0].y);
        oCtx.strokeStyle = sc; oCtx.lineWidth = 1; oCtx.globalAlpha = 0.3;
        oCtx.setLineDash([3, 6]); oCtx.stroke(); oCtx.setLineDash([]); oCtx.globalAlpha = 1;
      }
    }
    const firstNear = mousePos && drawPts.length >= 3 &&
      Math.hypot(mousePos.x - drawPts[0].x, mousePos.y - drawPts[0].y) < 15;
    drawPts.forEach((p, i) => {
      const isFirst = i === 0;
      const r = isFirst ? (firstNear ? 10 : 7) : 5;
      oCtx.fillStyle = isFirst ? CLR.drawPtFirst : CLR.vx;
      oCtx.strokeStyle = isFirst ? (firstNear ? '#fff' : CLR.drawPtFirst) : sc;
      oCtx.lineWidth = isFirst ? 2.5 : 2;
      oCtx.beginPath(); oCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
      oCtx.fill(); oCtx.stroke();
      oCtx.fillStyle = isFirst ? '#000' : '#fff';
      oCtx.font = 'bold 9px sans-serif'; oCtx.textAlign = 'center';
      oCtx.fillText(i + 1, p.x, p.y + 3.5); oCtx.textAlign = 'left';
    });
    if (firstNear) {
      oCtx.font = 'bold 11px sans-serif'; oCtx.textAlign = 'center';
      oCtx.fillStyle = 'rgba(0,0,0,.7)';
      oCtx.fillRect(drawPts[0].x - 50, drawPts[0].y - 28, 100, 18);
      oCtx.fillStyle = CLR.drawPtFirst;
      oCtx.fillText('クリックで確定', drawPts[0].x, drawPts[0].y - 14);
      oCtx.textAlign = 'left';
    }
    oCtx.restore();
  }
}

function setMode(m) {
  if (mode === 'draw' && m !== 'draw') {
    drawPts = []; mousePos = null;
    document.getElementById('btnConfirm').style.display = 'none';
  }
  mode = (mode === m) ? 'none' : m;
  document.getElementById('btnSc').classList.toggle('on', mode === 'scale');
  document.getElementById('btnAd').classList.toggle('on', mode === 'adjust');
  document.getElementById('btnDr').classList.toggle('on', mode === 'draw');
  document.getElementById('scRow').style.display = mode === 'scale' ? 'flex' : 'none';
  document.getElementById('drawCtrl').style.display = mode === 'draw' ? 'flex' : 'none';
  ov.style.cursor = (mode === 'scale' || mode === 'draw') ? 'crosshair' : 'default';
  if (mode === 'scale') { scalePts = []; scaleRatio = null; stat('📏 基準となる2点をクリック（例：サッシ幅の両端・既知の長さ）', 'info'); }
  else if (mode === 'adjust') { stat('🖱 円をドラッグして頂点を調整 / 離すと面積が再計算されます', 'info'); }
  else if (mode === 'draw') { stat('✏️ クリックで頂点を追加 — 3点以上で「✅ 確定」ボタンが現れます / 最初の点を再クリックで自動確定', 'info'); }
  else { stat(''); }
  if (mode !== 'draw') { drawPts = []; document.getElementById('btnConfirm').style.display = 'none'; }
  drawOv();
}

function setDrawType(t) {
  drawPolyType = t;
  document.getElementById('dtWall').className = 'dt-btn' + (t === 'wall' ? ' wall-on' : '');
  document.getElementById('dtOpen').className = 'dt-btn' + (t === 'opening' ? ' open-on' : '');
  drawOv();
}

function confirmDrawPoly() {
  if (drawPts.length < 3) return;
  polys.push({ label: drawPolyType, points: drawPts.map(p => ({ x: p.x, y: p.y })) });
  const n = polys.filter(p => p.label === drawPolyType).length;
  const lbl = drawPolyType === 'wall' ? '壁 #' + n : '開口 #' + n;
  drawPts = []; mousePos = null;
  document.getElementById('btnConfirm').style.display = 'none';
  drawOv(); updateResult();
  stat('✅ ' + lbl + ' を追加しました', 'ok');
}

function cancelDraw() {
  drawPts = []; mousePos = null;
  document.getElementById('btnConfirm').style.display = 'none';
  drawOv();
  stat('✏️ ポリゴン作成をキャンセルしました / 再びクリックで開始', 'info');
}

function undoLast() {
  if (mode === 'draw' && drawPts.length > 0) {
    drawPts.pop();
    if (drawPts.length < 3) document.getElementById('btnConfirm').style.display = 'none';
    drawOv(); stat('↩ 最後の頂点を取り消しました', ''); return;
  }
  if (polys.length > 0) {
    polys.pop(); drawOv(); updateResult(); stat('↩ 最後のポリゴンを削除しました', '');
  }
}

function getPt(e) {
  const r = ov.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - r.left) * ov.width / r.width, y: (cy - r.top) * ov.height / r.height };
}

function hitTest(pos) {
  for (let pi = polys.length - 1; pi >= 0; pi--)
    for (let vi = 0; vi < polys[pi].points.length; vi++) {
      const p = polys[pi].points[vi];
      if (Math.hypot(p.x - pos.x, p.y - pos.y) <= HIT) return { pi, vi };
    }
  return null;
}

function onDown(e) {
  if (!img) return;
  const pos = getPt(e);
  if (mode === 'scale') {
    if (scalePts.length >= 2) scalePts = [];
    scalePts.push(pos);
    if (scalePts.length === 2) calcScale();
    drawOv();
  } else if (mode === 'adjust') {
    drag = hitTest(pos);
    if (drag) ov.style.cursor = 'grabbing';
  } else if (mode === 'draw') {
    if (drawPts.length >= 3) {
      const first = drawPts[0];
      if (Math.hypot(pos.x - first.x, pos.y - first.y) < 15) { confirmDrawPoly(); return; }
    }
    drawPts.push({ x: pos.x, y: pos.y });
    if (drawPts.length >= 3) document.getElementById('btnConfirm').style.display = '';
    drawOv();
  }
}

function onMove(e) {
  if (!img) return;
  const pos = getPt(e);
  if (mode === 'adjust') {
    if (drag) { polys[drag.pi].points[drag.vi] = pos; drawOv(); updateResult(); }
    else { ov.style.cursor = hitTest(pos) ? 'grab' : 'default'; }
  } else if (mode === 'draw') {
    mousePos = pos;
    if (drawPts.length >= 3) {
      const first = drawPts[0];
      ov.style.cursor = Math.hypot(pos.x - first.x, pos.y - first.y) < 15 ? 'pointer' : 'crosshair';
    }
    drawOv();
  }
}

function onUp() {
  if (drag) { drag = null; ov.style.cursor = 'default'; drawOv(); updateResult(); }
}

ov.addEventListener('mousedown', onDown);
ov.addEventListener('mousemove', onMove);
ov.addEventListener('mouseup', onUp);
ov.addEventListener('mouseleave', e => { if (mode === 'draw') { mousePos = null; drawOv(); } onUp(); });
ov.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
ov.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
ov.addEventListener('touchend',   e => { e.preventDefault(); onUp(e);   }, { passive: false });

function calcScale() {
  const p = scalePts;
  const d = Math.hypot(p[1].x - p[0].x, p[1].y - p[0].y);
  if (d < 2) { stat('⚠ 2点が近すぎます。離れた2点を指定してください。', 'warn'); return; }
  const mm = parseFloat(document.getElementById('realMm').value) || 1800;
  scaleRatio = mm / d;
  stat('✅ 実寸設定完了 — 1px ≒ ' + scaleRatio.toFixed(3) + ' mm', 'ok');
  drawOv(); updateResult();
}

document.getElementById('realMm').addEventListener('input', () => { if (scalePts.length === 2) calcScale(); });

function shoelace(pts) {
  let a = 0; const n = pts.length;
  for (let i = 0; i < n; i++) { const j = (i + 1) % n; a += pts[i].x * pts[j].y - pts[j].x * pts[i].y; }
  return Math.abs(a) / 2;
}

function px2m2(px2) { return scaleRatio ? px2 * scaleRatio * scaleRatio / 1e6 : null; }

function calcAreas() {
  let wPx = 0, oPx = 0;
  polys.forEach(p => { if (p.points.length < 3) return; const a = shoelace(p.points); p.label === 'wall' ? (wPx += a) : (oPx += a); });
  const nPx = Math.max(0, wPx - oPx);
  return { wPx, oPx, nPx, wM: px2m2(wPx), oM: px2m2(oPx), nM: px2m2(nPx) };
}

function updateResult() {
  const rp = document.getElementById('rp');
  if (polys.length === 0) { rp.style.display = 'none'; return; }
  rp.style.display = 'block';
  const { wM, oM, nM } = calcAreas();
  if (scaleRatio && nM !== null) {
    document.getElementById('rpV').textContent = nM.toFixed(2);
    document.getElementById('rpD').innerHTML = '壁: ' + wM.toFixed(2) + ' m²<br>開口: ' + oM.toFixed(2) + ' m²';
  } else {
    document.getElementById('rpV').textContent = '—';
    document.getElementById('rpD').textContent = '実寸設定が必要です';
  }
}

async function runAI() {
  if (!img) { stat('⚠ 写真を読み込んでください', 'warn'); return; }
  if (!cfg.apiKey) { stat('⚠ APIキーを設定してください', 'warn'); openSettings(); return; }
  if (!lastB64) { stat('⚠ 画像データがありません', 'warn'); return; }
  const btn = document.getElementById('aiBtn');
  btn.innerHTML = '<span class="spin"></span>AI解析中...'; btn.disabled = true;
  stat('🔍 Gemini 2.5 Flashで外壁輪郭を解析中...（10〜30秒）', 'info');
  try {
    const r = await gas({ action: 'runAI', apiKey: cfg.apiKey, image: lastB64 });
    if (r.result === 'ai_error') { stat('❌ AI: ' + r.message, 'err'); if (r.raw) console.warn('[AI raw]', r.raw); return; }
    if (r.result !== 'success') { stat('❌ ' + (r.message || '不明なエラー'), 'err'); return; }
    const parts = r.data && r.data.parts;
    if (!parts || !parts.length) { stat('❌ AIからポリゴンデータが返りませんでした', 'err'); return; }
    const newPolys = parts.filter(p => Array.isArray(p.points) && p.points.length >= 3)
      .map(p => ({ label: p.label === 'opening' ? 'opening' : 'wall', points: p.points.map(([y, x]) => ({ x: x * cW / 1000, y: y * cH / 1000 })) }));
    if (!newPolys.length) { stat('❌ 変換後にポリゴンが0件です', 'err'); return; }
    polys = [...polys, ...newPolys];
    drawOv(); updateResult();
    const wc = newPolys.filter(p => p.label === 'wall').length;
    const oc = newPolys.filter(p => p.label === 'opening').length;
    stat('✅ AI検出完了 — 壁 ' + wc + '面・開口 ' + oc + '個追加 ｜「✏️ ポリゴン作成」で手動追加も可', 'ok');
  } catch(e) { stat('❌ 通信エラー: ' + e.message, 'err'); console.error(e); }
  finally { btn.innerHTML = '✨ AI解析'; btn.disabled = false; }
}

function doClear() {
  polys = []; scalePts = []; scaleRatio = null; drag = null; drawPts = []; mousePos = null;
  document.getElementById('btnConfirm').style.display = 'none';
  drawOv(); document.getElementById('rp').style.display = 'none'; stat('');
}

async function initCase() {
  const code = document.getElementById('opCode').value.trim();
  const name = document.getElementById('clName').value.trim();
  if (!code || !name) { stat('⚠ 事業者コードと依頼主名を入力してください', 'warn'); return; }
  const year = new Date().getFullYear();
  const seq = String(Date.now()).slice(-4);
  caseId = code + '-' + year + '-' + name + '-' + seq;
  sides = []; faceIdx = 0;
  document.getElementById('cbadge').textContent = caseId;
  renderSides();
  try {
    const addr = document.getElementById('addr').value.trim();
    const r = await gas({ action: 'saveCase', caseId, operator: code, client: name, address: addr });
    stat(r.result === 'success' ? '✅ 案件登録完了: ' + caseId : '⚠ GAS登録失敗: ' + (r.message || ''), r.result === 'success' ? 'ok' : 'warn');
  } catch(e) { stat('⚠ GAS通信エラー（ローカルのみ設定済み）', 'warn'); }
}

async function recordFace() {
  if (!caseId) { stat('⚠ 案件を登録してください', 'warn'); return; }
  if (!polys.length) { stat('⚠ AI解析またはポリゴン作成が必要です', 'warn'); return; }
  if (!scaleRatio) { stat('⚠ 「📏 実寸設定」を先に完了してください', 'warn'); return; }
  const { wM, oM, nM } = calcAreas();
  const fn = document.getElementById('faceName').value.trim() || FACES[faceIdx] || '撮影面';
  sides.push({ fn, net: nM, wall: wM, open: oM, sr: scaleRatio });
  faceIdx++;
  if (FACES[faceIdx]) document.getElementById('faceName').value = FACES[faceIdx];
  renderSides();
  try {
    await gas({ action: 'saveRecord', caseId, sideName: fn, netArea: nM.toFixed(4), wallArea: wM.toFixed(4), openingArea: oM.toFixed(4), scaleRatio: scaleRatio.toFixed(4) });
    stat('✅ 「' + fn + '」記録完了 — 純塗装面積: ' + nM.toFixed(2) + ' m²', 'ok');
  } catch(e) { stat('✅ 「' + fn + '」ローカル記録済み（GAS保存エラー: ' + e.message + '）', 'ok'); }
}

function renderSides() {
  const el = document.getElementById('sideList');
  el.innerHTML = '';
  let tot = 0;
  sides.forEach(r => {
    tot += r.net;
    const d = document.createElement('div');
    d.className = 'sc';
    d.innerHTML = '<div class="fn">' + r.fn + '</div><div class="fa">' + r.net.toFixed(2) + ' <span style="font-size:12px;color:#555">m²</span></div><div class="fd">壁 ' + r.wall.toFixed(2) + ' / 開口 ' + r.open.toFixed(2) + ' m²</div>';
    el.appendChild(d);
  });
  const tr = document.getElementById('totRow');
  tr.style.display = sides.length ? 'flex' : 'none';
  document.getElementById('totVal').textContent = tot.toFixed(2);
  document.getElementById('totUnit').textContent = sides.length ? 'm²' : '';
}

async function gas(data) {
  const url = cfg.gasUrl || GAS_DEFAULT;
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function openSettings() {
  document.getElementById('sKey').value = cfg.apiKey;
  document.getElementById('sUrl').value = cfg.gasUrl;
  document.getElementById('settModal').classList.add('open');
}
function closeSettings() { document.getElementById('settModal').classList.remove('open'); }
function saveSettings() {
  cfg.apiKey = document.getElementById('sKey').value.trim();
  cfg.gasUrl = document.getElementById('sUrl').value.trim() || GAS_DEFAULT;
  localStorage.setItem('r_key', cfg.apiKey);
  localStorage.setItem('r_url', cfg.gasUrl);
  closeSettings(); stat('✅ 設定を保存しました', 'ok');
}

let stTimer = null;
function stat(msg, type = '') {
  const el = document.getElementById('st');
  el.textContent = msg;
  el.className = 'st' + (type ? ' ' + type : '');
  el.style.display = msg ? 'block' : 'none';
  clearTimeout(stTimer);
  if (type === 'ok') stTimer = setTimeout(() => stat(''), 7000);
}

window.addEventListener('resize', () => {
  if (!img) return;
  const { w, h } = fitSize(img.width, img.height);
  if (w === cW && h === cH) return;
  const sx = w / cW, sy = h / cH;
  polys.forEach(poly => poly.points.forEach(p => { p.x *= sx; p.y *= sy; }));
  scalePts.forEach(p => { p.x *= sx; p.y *= sy; });
  drawPts.forEach(p => { p.x *= sx; p.y *= sy; });
  resize(w, h); drawImg();
  if (scalePts.length === 2) calcScale(); else drawOv();
  updateResult();
});
</script>
