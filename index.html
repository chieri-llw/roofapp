<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LimeLight Work — Deal Universe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body { background:#07090f; color:#e8edf5; font-family:'Hiragino Sans', 'Yu Gothic', sans-serif; height:100%; min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#main { flex:1; display:flex; overflow:hidden; min-height:0; }

/* HEADER */
#header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid #1e2530; flex-shrink:0; gap:8px; flex-wrap:wrap; }
.brand { display:flex; flex-direction:column; }
.brand-name { font-family:monospace; font-size:13px; letter-spacing:0.14em; font-weight:600; color:#e6b450; }
.brand-sub { font-size:10px; color:#6b7585; margin-top:1px; }
.legend { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:#6b7585; font-family:monospace; }
.legend-dot { width:8px; height:8px; border-radius:50%; }
.legend-line { width:16px; height:2px; border-radius:1px; }
.header-actions { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }

/* BUTTONS */
.btn { border:none; cursor:pointer; font-family:monospace; font-size:10px; padding:5px 10px; border-radius:5px; transition:opacity .2s; }
.btn:hover { opacity:.8; }
.btn-primary { background:linear-gradient(135deg,#4cc9f0,#7c3aed); color:#fff; padding:6px 12px; }
.btn-outline { background:#1e2530; border:1px solid #2a3040; color:#6b7585; }
.btn-outline.active { background:#a371f718; border-color:#a371f7; color:#a371f7; }
.btn-sync { background:#22c55e18; border:1px solid #22c55e44; color:#22c55e; }
.btn-sync.syncing { animation:pulse 1s infinite; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; display:inline-block; margin-right:4px; }

#canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; min-width:0; }
canvas { position:absolute; inset:0; width:100%; height:100%; }

/* SYNC STATUS */
#sync-bar { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:#0e1117ee; border:1px solid #1e2530; border-radius:20px; padding:4px 14px; font-size:10px; font-family:monospace; color:#6b7585; pointer-events:none; transition:opacity .5s; }
#sync-bar.hidden { opacity:0; }

/* ADMIN PANEL */
#admin { width:360px; background:#0e1117; border-left:1px solid #1e2530; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.admin-tabs { display:flex; border-bottom:1px solid #1e2530; }
.admin-tab { flex:1; padding:10px; font-size:10px; font-family:monospace; text-align:center; cursor:pointer; color:#6b7585; border:none; background:none; transition:color .2s; }
.admin-tab.active { color:#a371f7; border-bottom:2px solid #a371f7; }
.admin-body { flex:1; overflow-y:auto; padding:14px; }

/* DETAIL PANEL */
#detail { width:340px; background:#0e1117; border-left:1px solid #1e2530; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.detail-header { padding:16px 18px 12px; border-bottom:1px solid #1e2530; flex-shrink:0; }
.detail-body { flex:1; overflow-y:auto; padding:14px 18px; }
.detail-footer { flex-shrink:0; padding:10px 18px; border-top:1px solid #1e2530; background:#07090f; }

/* CARDS & CHIPS */
.meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
.meta-card { background:#07090f; border:1px solid #1e2530; border-radius:5px; padding:7px 9px; }
.meta-label { font-family:monospace; font-size:9px; color:#6b7585; margin-bottom:2px; letter-spacing:.1em; }
.meta-val { font-size:12px; }
.chip { font-size:10px; padding:3px 8px; border-radius:20px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }

/* TIMELINE */
.timeline { position:relative; padding-left:16px; }
.timeline::before { content:''; position:absolute; left:5px; top:4px; bottom:4px; width:1px; background:#1e2530; }
.tl-item { position:relative; margin-bottom:12px; }
.tl-dot { position:absolute; left:-13px; top:3px; width:7px; height:7px; border-radius:50%; }
.tl-date { font-family:monospace; font-size:9px; color:#6b7585; margin-bottom:2px; }
.tl-text { font-size:11px; line-height:1.6; }

/* SECTION LABEL */
.sec-label { font-family:monospace; font-size:9px; color:#6b7585; letter-spacing:.12em; margin-bottom:8px; margin-top:14px; }
.sec-label:first-child { margin-top:0; }

/* CONNECTION ROW */
.conn-row { background:#07090f; border:1px solid #1e2530; border-radius:7px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.conn-row.editing { border-color:#a371f7; }
.conn-info { display:flex; align-items:center; gap:7px; font-size:11px; flex-wrap:wrap; }
.conn-actions { display:flex; gap:5px; flex-shrink:0; }
.btn-sm { background:none; border:1px solid #1e2530; color:#6b7585; padding:3px 8px; border-radius:4px; cursor:pointer; font-size:10px; }
.btn-sm-danger { border-color:#ff4d6d44; color:#ff4d6d; }

/* ADD FORM */
.add-form { background:#07090f; border:1px solid #1e2530; border-radius:8px; padding:14px; margin-bottom:16px; }
.form-row { display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-top:8px; }
.form-label { font-family:monospace; font-size:9px; color:#6b7585; letter-spacing:.1em; margin-bottom:8px; }
select, input, textarea { background:#07090f; border:1px solid #1e2530; color:#e8edf5; padding:6px 8px; border-radius:5px; font-size:11px; outline:none; font-family:inherit; }
select.accent, input.accent { border-color:#a371f7; }

/* BILLING */
.billing-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #1e2530; font-size:11px; }

/* MEMO INPUT */
.memo-wrap { display:flex; gap:7px; }
.memo-input { flex:1; background:#0e1117; border:1px solid #1e2530; border-radius:5px; color:#e8edf5; font-size:11px; padding:6px 9px; outline:none; }
.btn-add { background:#4cc9f0; color:#000; font-weight:600; padding:6px 10px; border:none; border-radius:5px; cursor:pointer; font-size:10px; font-family:monospace; }

/* MODAL */
#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:500; display:flex; align-items:center; justify-content:center; }
#modal-overlay.hidden { display:none; }
.modal { background:#0e1117; border:1px solid #1e2530; border-radius:10px; padding:22px 26px; width:420px; max-width:90vw; }
.modal h3 { font-size:14px; font-weight:500; margin-bottom:4px; }
.modal p { font-size:11px; color:#6b7585; margin-bottom:14px; line-height:1.6; }
.modal-footer { display:flex; gap:9px; justify-content:flex-end; margin-top:14px; }
.btn-cancel { background:none; border:1px solid #1e2530; color:#6b7585; padding:7px 14px; border-radius:5px; cursor:pointer; font-size:12px; }
.btn-save { background:linear-gradient(135deg,#4cc9f0,#7c3aed); border:none; color:#fff; padding:7px 18px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:500; }

/* SHEET LINK */
.sheet-link { display:inline-flex; align-items:center; gap:5px; font-size:10px; color:#4cc9f0; text-decoration:none; padding:4px 10px; border:1px solid #4cc9f044; border-radius:20px; font-family:monospace; }
.sheet-link:hover { background:#4cc9f011; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.fade-in { animation:fadeIn .3s ease; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="brand">
      <div class="brand-name">LIMELIGHT WORK</div>
      <div class="brand-sub">Deal Universe — ロールアップ案件マップ</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff4d6d"></div>最優先</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffa94d"></div>進行中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4cc9f0"></div>交渉中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a371f7"></div>仕込み中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>新規</div>
      <div class="legend-item" style="margin-left:8px"><div class="legend-line" style="background:#a371f7"></div>協業</div>
      <div class="legend-item"><div class="legend-line" style="background:#4cc9f0"></div>業務委託</div>
      <div class="legend-item"><div class="legend-line" style="background:#ffa94d;height:2px;border-top:2px dashed #ffa94d;background:none"></div>M&A</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-sync" id="syncBtn" onclick="syncFromSheets()">
      <span class="sync-dot"></span>Sheetsと同期
    </button>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1k1-B4BeykIi_0eQJz8x3MseS7AZWuA8P2hPdb6yO3tI/edit" target="_blank">📊 Sheetsを開く</a>
    <button class="btn btn-outline" id="adminToggle" onclick="toggleAdmin()">⚙️ 管理</button>
    <button class="btn btn-primary" onclick="openMemoModal()">＋ メモ</button>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="sync-bar" class="hidden">✅ Sheetsからデータを読み込みました</div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin" style="display:none">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="setAdminTab('connections')">接続管理</button>
      <button class="admin-tab" onclick="setAdminTab('status')">ステータス</button>
      <button class="admin-tab" onclick="setAdminTab('billing')">請求</button>
    </div>
    <div class="admin-body" id="admin-body"></div>
  </div>

  <!-- DETAIL PANEL -->
  <div id="detail" style="display:none">
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:15px;font-weight:600;margin-bottom:2px" id="d-name"></div>
          <div style="font-size:12px;color:#a371f7;margin-bottom:6px" id="d-president"></div>
          <span id="d-status-chip" class="chip" style="font-size:10px;font-family:monospace"></span>
        </div>
        <button onclick="closeDetail()" style="background:none;border:none;color:#6b7585;font-size:20px;cursor:pointer">×</button>
      </div>

    <div class="detail-body" id="detail-body"></div>
    <div class="detail-footer">
      <div class="memo-wrap">
        <input class="memo-input" id="memo-input" placeholder="進捗メモ... (Enter)" onkeydown="if(event.key==='Enter')addMemo()">
        <button class="btn-add" onclick="addMemo()">追加</button>
      </div>

</div>

<!-- MEMO MODAL -->
<div id="modal-overlay" class="hidden" onclick="if(event.target===this)closeMemoModal()">
  <div class="modal fade-in">
    <h3>📝 メモを追加</h3>
    <p>案件を選んでメモを入力。Sheetsの活動ログにも自動記録されます。</p>
    <select id="modal-company" style="width:100%;margin-bottom:9px"></select>
    <select id="modal-act-type" style="width:100%;margin-bottom:9px">
      <option>🤝 MTG</option><option>📞 電話/連絡</option><option>💬 打ち合わせ</option>
      <option>📧 メール</option><option>🧪 テスト</option><option>📄 契約</option><option>📝 その他</option>
    </select>
    <textarea id="modal-text" style="width:100%;min-height:80px;resize:vertical" placeholder="今日の進捗・会話内容・次のアクション"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMemoModal()">キャンセル</button>
      <button class="btn-save" onclick="saveMemo()">保存する</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SHEET_ID = "1k1-B4BeykIi_0eQJz8x3MseS7AZWuA8P2hPdb6yO3tI";
const API_URL = ""; // デプロイ後にURLを設定（同じスクリプトなので空でOK）

// ── COLORS ──
const STATUS_COLOR = { hot:"#ff4d6d", warm:"#ffa94d", active:"#4cc9f0", cool:"#a371f7", new:"#38bdf8", done:"#22c55e" };
const STATUS_LABEL = { hot:"最優先", warm:"進行中", active:"交渉中", cool:"仕込み中", new:"新規", done:"完了" };
const CONN_COLORS = { collab:"#a371f7", commission:"#4cc9f0", ma_buy:"#ffa94d", ma_sell:"#ff4d6d" };
const CONN_LABELS = { collab:"協業", commission:"業務委託", ma_buy:"M&A（買い）", ma_sell:"M&A（売り）" };
const CONN_DASH = { collab:[], commission:[], ma_buy:[5,4], ma_sell:[5,4] };

// ── STATUS MAP (Sheets → internal) ──
const STATUS_MAP = { "稼働中":"hot", "進行中":"warm", "交渉中":"active", "仕込み中":"cool", "新規":"new", "完了":"done" };
const REL_MAP = { "協業":"collab", "業務委託":"commission", "M&A（買い）":"ma_buy", "M&A（売り）":"ma_sell" };
const DIR_MAP = { "→ 送信":"out", "← 受信":"in", "↔ 双方向":"both" };

// ── STATE ──
let deals = [];
let conns = [];
let selected = null;
let hovered = null;
let tick = 0;
let showAdmin = false;
let adminTab = "connections";
let editConnId = null;
let newConn = { from:"LimeLight Work", to:"", type:"collab", direction:"both", amount:"" };

// Radial layout
const radial = (i, total, rx=0.38, ry=0.34) => {
  const angle = (2*Math.PI*i/total) - Math.PI/2;
  return { x:0.50+rx*Math.cos(angle), y:0.50+ry*Math.sin(angle) };
};

// ── CANVAS ──
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const wrap = document.getElementById("canvas-wrap");
  const headerH = document.getElementById("header")?.offsetHeight || 50;
  const w = wrap.offsetWidth || window.innerWidth || 1200;
  const h = wrap.offsetHeight || (window.innerHeight - headerH) || 700;
  if(w > 10 && h > 10) { canvas.width = w; canvas.height = h; }
}
window.addEventListener("resize", resizeCanvas);
// DOMが完全に読み込まれてからリサイズ
if(document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => { resizeCanvas(); });
} else {
  resizeCanvas();
}
setTimeout(resizeCanvas, 100);
setTimeout(resizeCanvas, 500);

function getR(d) { return d.isCenter ? 50 : 36; }
function getPos(d) { return { x: d.x * canvas.width, y: d.y * canvas.height }; }

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Grid dots
  ctx.fillStyle = "rgba(30,37,48,0.4)";
  for(let gx=0;gx<W;gx+=44) for(let gy=0;gy<H;gy+=44){
    ctx.beginPath(); ctx.arc(gx,gy,1,0,Math.PI*2); ctx.fill();
  }

  // Connections
  conns.forEach(conn => {
    const fd = deals.find(d=>d.name===conn.from);
    const td = deals.find(d=>d.name===conn.to);
    if(!fd||!td) return;
    const fp = getPos(fd), tp = getPos(td);
    const isH = hovered && (hovered.name===fd.name||hovered.name===td.name);
    const col = CONN_COLORS[conn.type] || "#4cc9f0";
    ctx.save();
    ctx.beginPath(); ctx.moveTo(fp.x,fp.y); ctx.lineTo(tp.x,tp.y);
    ctx.strokeStyle = col+(isH?"cc":"33");
    ctx.lineWidth = isH?2:0.9;
    ctx.setLineDash(CONN_DASH[conn.type]||[]);
    ctx.stroke(); ctx.setLineDash([]);

    const drawArrow = (fx,fy,tx,ty,tD) => {
      const ang = Math.atan2(ty-fy,tx-fx);
      const tr = getR(tD);
      const ax = tx-Math.cos(ang)*(tr+5), ay = ty-Math.sin(ang)*(tr+5);
      ctx.beginPath(); ctx.moveTo(ax,ay);
      ctx.lineTo(ax-9*Math.cos(ang-.45),ay-9*Math.sin(ang-.45));
      ctx.lineTo(ax-9*Math.cos(ang+.45),ay-9*Math.sin(ang+.45));
      ctx.closePath(); ctx.fillStyle=col+(isH?"dd":"66"); ctx.fill();
    };
    if(conn.direction==="out"||conn.direction==="both") drawArrow(fp.x,fp.y,tp.x,tp.y,td);
    if(conn.direction==="in"||conn.direction==="both") drawArrow(tp.x,tp.y,fp.x,fp.y,fd);
    ctx.restore();
  });

  // Bubbles
  deals.forEach(d => {
    const {x,y} = getPos(d);
    const r = getR(d);
    const col = d.isCenter ? "#e6b450" : (STATUS_COLOR[d.status]||"#4cc9f0");
    const isH = hovered?.name===d.name;
    const isSel = selected?.name===d.name;

    // Pulse for high priority
    if(d.priority>=8||d.isCenter){
      const p = 0.85+0.15*Math.sin(tick*.1+d.id);
      ctx.beginPath(); ctx.arc(x,y,r*1.28*p,0,Math.PI*2);
      ctx.strokeStyle=col+"44"; ctx.lineWidth=1.5; ctx.stroke();
    }

    // Glow
    if(isH||isSel||d.isCenter){
      const g = ctx.createRadialGradient(x,y,r*.2,x,y,r*2.3);
      g.addColorStop(0,col+(d.isCenter?"38":"20")); g.addColorStop(1,"transparent");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2.3,0,Math.PI*2); ctx.fill();
    }

    // Ring
    ctx.beginPath(); ctx.arc(x,y,r+5,0,Math.PI*2);
    ctx.strokeStyle=isSel?col:isH?col+"bb":col+"55";
    ctx.lineWidth=isSel?2.5:1.5; ctx.stroke();

    // Fill
    const g2 = ctx.createRadialGradient(x-r*.2,y-r*.25,r*.05,x,y,r);
    g2.addColorStop(0,col+"ee"); g2.addColorStop(.6,col+"99"); g2.addColorStop(1,col+"44");
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=g2; ctx.fill();

    // Text
    ctx.textAlign="center"; ctx.textBaseline="middle";
    const nfs = d.isCenter?13:Math.max(9,r*.22);
    const pfs = d.isCenter?11:Math.max(7.5,r*.18);
    ctx.font=`600 ${nfs}px sans-serif`; ctx.fillStyle="#fff";

    // Name (split if long)
    const nm = d.name;
    if(ctx.measureText(nm).width > r*1.8 && nm.includes(" ")){
      const parts = nm.split(" ");
      const mid = Math.ceil(parts.length/2);
      ctx.fillText(parts.slice(0,mid).join(""),x,y-(pfs*.8));
      ctx.fillText(parts.slice(mid).join(""),x,y+(pfs*.1));
      ctx.font=`300 ${pfs}px sans-serif`; ctx.fillStyle="rgba(255,255,255,.65)";
      ctx.fillText(d.president||"",x,y+(pfs*1.2));
    } else {
      ctx.fillText(nm,x,y-(d.isCenter?8:pfs*.5));
      ctx.font=`300 ${pfs}px sans-serif`; ctx.fillStyle="rgba(255,255,255,.65)";
      ctx.fillText(d.president||"",x,y+(d.isCenter?9:pfs*.9));
    }
  });
}

// ── ANIMATION LOOP ──
function loop(){ tick++; draw(); requestAnimationFrame(loop); }

// ── MOUSE EVENTS ──
function getHit(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for(let i=deals.length-1;i>=0;i--){
    const d=deals[i]; const {x,y}=getPos(d);
    if(Math.hypot(mx-x,my-y)<=getR(d)+5) return d;
  }
  return null;
}
canvas.addEventListener("mousemove",e=>{hovered=getHit(e); canvas.style.cursor=hovered?"pointer":"default";});
canvas.addEventListener("mouseleave",()=>{hovered=null;});
canvas.addEventListener("click",e=>{
  const h=getHit(e);
  if(h){ selected=h; showDetail(); }
  else { selected=null; hideDetail(); }
});

// ── SHEETS SYNC ──
async function syncFromSheets() {
  const btn = document.getElementById("syncBtn");
  btn.classList.add("syncing");
  btn.innerHTML = '<span class="sync-dot"></span>同期中...';
  try {
    const SHEET_ID = "1k1-B4BeykIi_0eQJz8x3MseS7AZWuA8P2hPdb6yO3tI";
    const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const [dealsRes, relsRes, logsRes] = await Promise.all([
      fetch(`${base}&sheet=${encodeURIComponent("📋 案件マスタ")}`),
      fetch(`${base}&sheet=${encodeURIComponent("🔗 関係性マップ")}`),
      fetch(`${base}&sheet=${encodeURIComponent("📝 活動ログ")}`),
    ]);
    const dealsJson = await parseGviz(dealsRes);
    const relsJson  = await parseGviz(relsRes);
    const logsJson  = await parseGviz(logsRes);
    if (dealsJson.length) applyDealsData(dealsJson);
    if (relsJson.length)  applyRelsData(relsJson);
    if (logsJson.length)  applyLogsData(logsJson);
    showSyncBar("✅ Sheetsからデータを読み込みました");
  } catch(err) {
    showSyncBar("⚠️ 同期エラー：シートの共有設定を確認してください");
    console.error(err);
  }
  btn.classList.remove("syncing");
  btn.innerHTML = '<span class="sync-dot"></span>Sheetsと同期';
  renderAdmin();
  if(selected) showDetail();
}

function applyDealsData(rows) {
  const existing = new Map(deals.map(d=>[d.name,d]));
  const center = deals.find(d=>d.isCenter);
  
  // 放射状配置
  const nonCenter = rows.filter(r=>r["会社名"]&&r["会社名"]!=="LimeLight Work");
  const positions = nonCenter.map((_,i)=>radial(i,nonCenter.length));
  let posIdx = 0;
  
  const newDeals = rows.filter(r=>r["会社名"]).map((r,idx) => {
    const isCenter = r["会社名"]==="LimeLight Work";
    const prev = existing.get(r["会社名"]);
    const pos = isCenter ? {x:0.50,y:0.50} : (prev ? {x:prev.x,y:prev.y} : positions[posIdx++]);
    return {
      id: idx,
      name: r["会社名"],
      president: r["社長名"]||"",
      category: r["カテゴリ"]||"",
      status: STATUS_MAP[r["ステータス"]]||"new",
      priority: starToPriority(r["優先度"]),
      revenue: parseFloat(r["想定収益(万円)"])||0,
      detail: r["メモ"]||"",
      nextAction: r["次のアクション"]||"",
      deadline: r["期日"]||"",
      person: r["担当者"]||"",
      isCenter,
      billing: prev?.billing||[],
      logs: prev?.logs||[],
      ...pos
    };
  });
  
  deals = newDeals.length ? newDeals : deals;
}

function applyRelsData(rows) {
  const newConns = rows.filter(r=>r["送信元"]&&r["送信先"]).map((r,i)=>({
    id: "c"+i,
    from: r["送信元"],
    to: r["送信先"],
    type: REL_MAP[r["関係性"]]||"collab",
    direction: DIR_MAP[r["方向"]]||"both",
    amount: r["金額(円)"]||""
  }));
  if(newConns.length) conns = newConns;
}

function applyLogsData(rows) {
  rows.filter(r=>r["会社名"]).forEach(r=>{
    const deal = deals.find(d=>d.name===r["会社名"]);
    if(!deal) return;
    const exists = deal.logs.some(l=>l.date===r["日付"]&&l.text===r["内容"]);
    if(!exists) {
      deal.logs = deal.logs.map(l=>({...l,latest:false}));
      deal.logs.push({ date:r["日付"]||"", text:r["内容"]||"", latest:true });
    }
  });
}

function starToPriority(star){
  if(!star) return 5;
  const count = (star.match(/★/g)||[]).length;
  return count*2;
}

function showSyncBar(msg){
  const bar = document.getElementById("sync-bar");
  bar.textContent = msg;
  bar.classList.remove("hidden");
  setTimeout(()=>bar.classList.add("hidden"),3000);
}

// ── DETAIL PANEL ──

function closeDetail(){ selected=null; document.getElementById("detail").style.display="none"; resizeCanvas(); }
function hideDetail(){ document.getElementById("detail").style.display="none"; resizeCanvas(); }
function selectByName(name){ selected=deals.find(d=>d.name===name)||null; if(selected)showDetail(); }

// ── MEMO ──
function addMemo(){
  const input = document.getElementById("memo-input");
  if(!input.value.trim()||!selected) return;
  const today = new Date().toISOString().split("T")[0];
  selected.logs = selected.logs.map(l=>({...l,latest:false}));
  selected.logs.push({date:today,text:input.value.trim(),latest:true});
  input.value="";
  showDetail();
  // Sheetsにも送る（デプロイ後）
  postToSheets("addLog",{company:selected.name,president:selected.president,content:selected.logs[selected.logs.length-1].text,actType:"📝 その他",date:today});
}

function openMemoModal(){
  document.getElementById("modal-overlay").classList.remove("hidden");
  const sel = document.getElementById("modal-company");
  sel.innerHTML = deals.map(d=>`<option>${d.name}</option>`).join("");
}
function closeMemoModal(){ document.getElementById("modal-overlay").classList.add("hidden"); }
function saveMemo(){
  const company = document.getElementById("modal-company").value;
  const actType = document.getElementById("modal-act-type").value;
  const text = document.getElementById("modal-text").value.trim();
  if(!text) return;
  const today = new Date().toISOString().split("T")[0];
  const deal = deals.find(d=>d.name===company);
  if(deal){
    deal.logs = deal.logs.map(l=>({...l,latest:false}));
    deal.logs.push({date:today,text,latest:true});
    if(selected?.name===company) showDetail();
  }
  postToSheets("addLog",{company,actType,content:text,date:today});
  document.getElementById("modal-text").value="";
  closeMemoModal();
  showSyncBar("✅ 活動ログに追記しました");
}

// ── ADMIN ──
function toggleAdmin(){
  showAdmin=!showAdmin;
  document.getElementById("admin").style.display=showAdmin?"flex":"none";
  document.getElementById("adminToggle").classList.toggle("active",showAdmin);
  resizeCanvas();
  if(showAdmin) renderAdmin();
}
function setAdminTab(tab){
  adminTab=tab;
  document.querySelectorAll(".admin-tab").forEach((t,i)=>t.classList.toggle("active",["connections","status","billing"][i]===tab));
  renderAdmin();
}

function renderAdmin(){
  const body=document.getElementById("admin-body");
  if(adminTab==="connections") renderConnAdmin(body);
  else if(adminTab==="status") renderStatusAdmin(body);
  else renderBillingAdmin(body);
}

// ── ACTIONS ──
function addConn(){
  const from=document.getElementById("nc-from").value;
  const to=document.getElementById("nc-to").value;
  const type=document.getElementById("nc-type").value;
  const dir=document.getElementById("nc-dir").value;
  const amount=document.getElementById("nc-amount").value;
  if(from===to){alert("送信元と送信先が同じです");return;}
  conns.push({id:"c"+Date.now(),from,to,type,direction:dir,amount});
  postToSheets("updateRelation",{from,to,relType:CONN_LABELS[type],direction:["out","in","both"].includes(dir)?{out:"→ 送信",in:"← 受信",both:"↔ 双方向"}[dir]:dir,amount});
  renderAdmin();
  showSyncBar("✅ 接続を追加しました");
}

function deleteConn(id){
  conns=conns.filter(c=>c.id!==id);
  renderAdmin();
}

function updateStatus(name,field,val){
  const deal=deals.find(d=>d.name===name);
  if(!deal) return;
  deal[field]=val;
  // Sheetsに送る
  const statusJa=Object.entries(STATUS_MAP).find(([k,v])=>v===val)?.[0]||val;
  postToSheets("updateStatus",{company:name,status:statusJa});
  renderAdmin();
  if(selected?.name===name) showDetail();
  showSyncBar("✅ ステータスを更新しました");
}

function addBilling(){
  const company=document.getElementById("bil-company").value;
  const type=document.getElementById("bil-type").value;
  const content=document.getElementById("bil-content").value;
  const amount=document.getElementById("bil-amount").value;
  if(!content||!amount) return;
  const deal=deals.find(d=>d.name===company);
  if(deal){ deal.billing=deal.billing||[]; deal.billing.push({label:content,amount:"¥"+parseInt(amount).toLocaleString(),paid:false}); }
  postToSheets("addBilling",{company,type,content,amount:parseInt(amount)});
  renderAdmin();
  showSyncBar("✅ 請求を追加しました");
}

// ── POST TO SHEETS ──
async function postToSheets(action, data){
  // デプロイ後にスクリプトURLが設定されていれば送信
  if(!window.SCRIPT_URL) return;
  try {
    await fetch(window.SCRIPT_URL, {
      method:"POST",
      body:JSON.stringify({action,...data})
    });
  } catch(e){ console.log("Sheets post failed:", e); }
}
