<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>外壁積算 v11.5 Drag & Adjust</title>
    <style>
        :root { --bg: #0a0c10; --orange: #FF6B2B; --border: #252830; }
        body { font-family: sans-serif; background: var(--bg); color: #e2e4e9; margin: 0; text-align: center; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .panel { background: #111318; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .canvas-container { 
            position: relative; 
            margin-top: 15px; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            touch-action: none; /* スマホのスクロールを無効化して操作しやすく */
        }
        canvas { max-width: 100%; height: auto; display: block; }
        #overlayCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; }

        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-orange { background: var(--orange); color: #fff; }
        .res-val { font-size: 32px; color: var(--orange); font-weight: bold; }
        .hint { font-size: 12px; color: #888; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>外壁塗装積算 v11.5</h2>
    <div class="panel">
        <input type="file" id="fileIn" accept="image/*" onchange="handleFile(this)">
        <div class="canvas-container" id="cBox">
            <canvas id="mainCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
        </div>
        <p class="hint">💡 AI解析後、オレンジの角をドラッグして微調整できます</p>
        <button class="btn btn-orange" id="aiBtn" onclick="runAI()">✨ AIで下書きを作成</button>
    </div>
    
    <div class="panel">
        <div class="res-val" id="areaDisp">0.0</div>
        <div>積算面積 (m²)</div>
        <button class="btn" style="background:#3b82f6; color:#fff; display:none;" id="saveBtn" onclick="saveData()">台帳に保存</button>
    </div>
    
    <button onclick="openSet()" style="color:#666; background:none; border:none; cursor:pointer; font-size: 12px;">⚙ 設定を確認</button>
</div>

<div id="setModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#111; padding:30px; border-radius:12px; border:1px solid #333; width:85%;">
        <h3>システム設定</h3>
        <input type="password" id="keyIn" placeholder="Gemini API Key" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #444;">
        <input type="text" id="gasIn" placeholder="GAS WebApp URL" style="width:100%; padding:10px; margin-bottom:20px; background:#000; color:#fff; border:1px solid #444;">
        <button class="btn btn-orange" onclick="saveSet()">保存して閉じる</button>
    </div>
</div>

<script>
let app = { 
    points: [], // {x, y} の配列
    selectedIdx: -1,
    imgScale: 1
};

function openSet() { document.getElementById('setModal').style.display = 'flex'; }
function saveSet() {
    localStorage.setItem('roof_key', document.getElementById('keyIn').value.trim());
    localStorage.setItem('roof_gas', document.getElementById('gasIn').value.trim());
    document.getElementById('setModal').style.display = 'none';
    alert("設定を保存しました。");
}

window.onload = () => {
    document.getElementById('keyIn').value = localStorage.getItem('roof_key') || '';
    document.getElementById('gasIn').value = localStorage.getItem('roof_gas') || '';
    setupEvents();
};

function handleFile(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const cv = document.getElementById('mainCanvas');
            const ov = document.getElementById('overlayCanvas');
            const w = 600; 
            const h = img.height * (w / img.width);
            cv.width = ov.width = w; cv.height = ov.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            app.points = []; // 新しい画像にしたらリセット
            render();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
}

async function runAI() {
    const key = localStorage.getItem('roof_key');
    const gas = localStorage.getItem('roof_gas');
    if(!key || !gas) return alert("設定からキーとURLを保存してください。");

    const btn = document.getElementById('aiBtn');
    btn.innerText = "AIが解析中..."; btn.disabled = true;

    const base64 = document.getElementById('mainCanvas').toDataURL('image/jpeg', 0.6).split(',')[1];

    try {
        const res = await fetch(gas, {
            method: 'POST',
            body: JSON.stringify({ action: 'runAI', apiKey: key, image: base64 })
        });
        const result = await res.json();
        if(result.result !== 'success') throw new Error(result.message);

        const text = result.data.candidates[0].content.parts[0].text;
        const json = JSON.parse(text.replace(/```json|```/g, "").trim());
        
        // AIの座標をキャンバスサイズに変換
        const ov = document.getElementById('overlayCanvas');
        app.points = json.points.map(p => ({
            y: (p[0] / 1000) * ov.height,
            x: (p[1] / 1000) * ov.width
        }));

        render();
        document.getElementById('saveBtn').style.display = "block";
    } catch (e) {
        alert("エラー: " + e.message);
    } finally {
        btn.innerText = "✨ AIで下書きを作成"; btn.disabled = false;
    }
}

// 多角形の描画
function render() {
    const ov = document.getElementById('overlayCanvas');
    const ctx = ov.getContext('2d');
    ctx.clearRect(0, 0, ov.width, ov.height);

    if (app.points.length === 0) return;

    // 塗りつぶし
    ctx.fillStyle = 'rgba(255, 107, 43, 0.3)';
    ctx.strokeStyle = '#FF6B2B';
    ctx.lineWidth = 2;
    ctx.beginPath();
    app.points.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // ハンドル（角）の描画
    app.points.forEach(p => {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    });

    calculateArea();
}

// 面積計算（座標法 / Surveyor's Formula）
function calculateArea() {
    if (app.points.length < 3) return;
    let sum = 0;
    for (let i = 0; i < app.points.length; i++) {
        let j = (i + 1) % app.points.length;
        sum += app.points[i].x * app.points[j].y;
        sum -= app.points[j].x * app.points[i].y;
    }
    // ピクセル面積を仮のm2に変換（実際は基準となる長さが必要ですが、デモ用に係数を使用）
    const pixelArea = Math.abs(sum) / 2;
    const realArea = (pixelArea / 500).toFixed(1); // ここはスケーリング調整が必要
    document.getElementById('areaDisp').textContent = realArea;
}

// ドラッグ操作のイベント設定
function setupEvents() {
    const ov = document.getElementById('overlayCanvas');

    const getPos = (e) => {
        const rect = ov.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const down = (e) => {
        const pos = getPos(e);
        app.selectedIdx = app.points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 20);
    };

    const move = (e) => {
        if (app.selectedIdx === -1) return;
        e.preventDefault();
        const pos = getPos(e);
        app.points[app.selectedIdx] = pos;
        render();
    };

    const up = () => { app.selectedIdx = -1; };

    ov.addEventListener('mousedown', down);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);

    ov.addEventListener('touchstart', down, { passive: false });
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('touchend', up);
}

async function saveData() {
    const gas = localStorage.getItem('roof_gas');
    const area = document.getElementById('areaDisp').textContent;
    await fetch(gas, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', totalNetArea: area, clientName: "AI計測依頼" })
    });
    alert("台帳に保存しました！");
}
</script>
</body>
</html>
