<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>外壁塗装積算システム - Gemini Detect v3.4</title>
    <style>
        :root {
            --bg: #0a0c10; --bg2: #111318; --bg3: #1a1d24; --border: #252830; 
            --orange: #FF6B2B; --green: #10b981; --blue: #3b82f6; --purple: #8b5cf6; 
            --text: #e2e4e9; --muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        .header { background: var(--bg2); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .content { padding: 20px; flex: 1; }
        .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; display: none; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: #fff; font-size: 14px; outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .canvas-container { position: relative; margin: 20px 0; background: #000; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 200px; }
        canvas { max-width: 100%; height: auto; display: block; }
        #buildingCanvas, #selectCanvas { position: absolute; top: 0; left: 50%; transform: translateX(-50%); pointer-events: none; }
        #selectCanvas { pointer-events: auto; cursor: crosshair; }

        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-orange { background: var(--orange); color: #fff; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .res-card { background: var(--bg3); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .res-val { font-size: 20px; font-weight: 800; color: var(--orange); }
        .res-label { font-size: 10px; color: var(--muted); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg2); padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid var(--border); }

        .type-toggle { display: flex; gap: 10px; margin: 15px 0; }
        .type-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--border); background: var(--bg3); color: var(--muted); cursor: pointer; font-weight: 700; }
        .type-btn.active.wall { border-color: var(--orange); color: var(--orange); }
        .type-btn.active.win { border-color: var(--green); color: var(--green); }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--purple); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 2000; animation: slideUp 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>外壁塗装積算システム <span style="font-size: 10px; color: var(--muted);">Gemini Detect v3.4</span></h1>
    <button class="btn btn-secondary" onclick="openSettings()" style="padding: 8px 12px;">⚙️ 設定</button>
</div>

<div class="container">
    <div class="content">
        <div class="panel active" id="setupSection">
            <h2 style="margin-bottom: 20px;">案件情報入力</h2>
            <div class="form-group"><label>依頼主名 *</label><input type="text" id="clientName" placeholder="例: 田中様"></div>
            <div class="form-row">
                <div class="form-group"><label>現場住所 *</label><input type="text" id="siteAddress"></div>
                <div class="form-group"><label>担当者</label><input type="text" id="staff"></div>
            </div>
            <button class="btn btn-primary" onclick="startProject()" style="width: 100%;">積算を開始する</button>
        </div>

        <div class="panel" id="measuringSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="displayProjectNum">NK-2026-000</h3>
                <span id="displayPhotoNum" style="color: var(--purple); font-weight: 800;">1枚目</span>
            </div>

            <div id="uploadZone" onclick="document.getElementById('photoInput').click()" style="border: 2px dashed var(--border); padding: 40px; text-align: center; cursor: pointer; border-radius: 10px; background: var(--bg3);">
                <span style="font-size: 40px;">📷</span><br>建物写真を選択してください
                <input type="file" id="photoInput" hidden onchange="handleFile(this)">
            </div>

            <div class="canvas-container" id="canvasWrap" style="display: none;">
                <canvas id="photoCanvas"></canvas>
                <canvas id="buildingCanvas"></canvas>
                <canvas id="selectCanvas"></canvas>
            </div>

            <div id="toolBar" style="display: none;">
                <div class="type-toggle">
                    <button class="type-btn active wall" id="typeWall" onclick="setMode('wall')">🟠 外壁</button>
                    <button class="type-btn win" id="typeWin" onclick="setMode('window')">🟢 窓・除外</button>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn btn-orange" id="aiBtn" onclick="runAIDetect()" style="flex: 2;">✨ Geminiで建物検出</button>
                    <button class="btn btn-secondary" onclick="undo()" style="flex: 1;">↩ 戻す</button>
                    <button class="btn btn-secondary" onclick="resetCanvas()" style="flex: 1;">🗑 クリア</button>
                </div>
            </div>

            <div class="res-grid" id="resGrid" style="display: none;">
                <div class="res-card"><div class="res-label">外壁面積</div><div class="res-val" id="wallArea">0.0</div><div class="res-label">m²</div></div>
                <div class="res-card"><div class="res-label">窓・除外</div><div class="res-val" id="winArea" style="color: var(--green);">0.0</div><div class="res-label">m²</div></div>
                <div class="res-card"><div class="res-label">塗装正味</div><div class="res-val" id="netArea" style="color: #fff;">0.0</div><div class="res-label">m²</div></div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" id="saveBtn" onclick="saveCurrentPhoto()" style="flex: 1; display: none;">この写真を保存</button>
                <button class="btn btn-primary" id="toListBtn" onclick="switchMode('review')" style="flex: 1; display: none;">リストを確認</button>
            </div>
        </div>

        <div class="panel" id="reviewSection">
            <h2 style="margin-bottom: 20px;">写真リスト</h2>
            <div id="photoList" style="margin-bottom: 20px;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="addMorePhoto()">+ 写真を追加</button>
                <button class="btn btn-success" onclick="switchMode('confirm')">最終確認へ</button>
            </div>
        </div>

        <div class="panel" id="confirmSection">
            <h2>登録内容の確認</h2>
            <div id="confirmData" style="background: var(--bg3); padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 14px;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="switchMode('review')">戻る</button>
                <button class="btn btn-primary" onclick="sendToGAS()" id="gasSubmitBtn">GASへ送信</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px;">システム設定</h3>
        <div class="form-group"><label>Gemini API Key</label><input type="password" id="apiKey" placeholder="AI Studioのキーを入力"></div>
        <div class="form-group"><label>GAS WebApp URL</label><input type="text" id="gasId" placeholder="https://script.google.com/macros/s/.../exec"></div>
        <div class="form-group"><label>基準スケール (px/m)</label><input type="number" id="scale" value="100"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn btn-secondary" onclick="closeSettings()" style="flex: 1;">閉じる</button>
            <button class="btn btn-primary" onclick="saveSettings()" style="flex: 1;">保存</button>
        </div>
    </div>
</div>

<script>
let app = {
    state: 'setup', mode: 'wall', session: null, photos: [], currentPhotoNum: 1,
    buildingMask: null, regions: [], ppm: 100
};

// 起動時の初期化
window.onload = () => {
    const saved = localStorage.getItem('roofapp_settings');
    if (saved) {
        const s = JSON.parse(saved);
        document.getElementById('apiKey').value = s.apiKey || '';
        document.getElementById('gasId').value = s.gasId || '';
        document.getElementById('scale').value = s.scale || 100;
        app.ppm = s.scale || 100;
    }
};

function saveSettings() {
    const s = {
        apiKey: document.getElementById('apiKey').value.trim(),
        gasId: document.getElementById('gasId').value.trim(),
        scale: document.getElementById('scale').value
    };
    localStorage.setItem('roofapp_settings', JSON.stringify(s));
    app.ppm = s.scale;
    closeSettings();
    showToast("設定を保存しました");
}

function startProject() {
    const name = document.getElementById('clientName').value;
    if (!name) return showToast("依頼主名を入力してください");
    app.session = {
        projectNum: `NK-${new Date().getFullYear()}-${Math.floor(Math.random()*900)+100}`,
        clientName: name, address: document.getElementById('siteAddress').value, staff: document.getElementById('staff').value
    };
    document.getElementById('displayProjectNum').textContent = app.session.projectNum;
    switchMode('measuring');
}

function switchMode(m) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(m + 'Section').classList.add('active');
    if (m === 'review') renderList();
    if (m === 'confirm') renderConfirm();
}

// 画像処理
function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => initCanvas(img);
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function initCanvas(img) {
    const cv = document.getElementById('photoCanvas');
    const bcv = document.getElementById('buildingCanvas');
    const scv = document.getElementById('selectCanvas');
    const wrap = document.getElementById('canvasWrap');
    
    const maxW = Math.min(document.querySelector('.content').clientWidth - 40, 800);
    const scale = maxW / img.width;
    const W = Math.round(img.width * scale);
    const H = Math.round(img.height * scale);
    
    [cv, bcv, scv].forEach(c => { 
        c.width = W; c.height = H;
        c.style.width = W + 'px'; c.style.height = H + 'px';
    });
    
    cv.getContext('2d').drawImage(img, 0, 0, W, H);
    wrap.style.display = 'flex';
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('toolBar').style.display = 'block';
    
    scv.onclick = (e) => handleCanvasClick(e);
    app.regions = []; app.buildingMask = null;
    bcv.getContext('2d').clearRect(0,0,W,H);
    scv.getContext('2d').clearRect(0,0,W,H);
    updateResultUI();
}

// --- Gemini AI Detect (v1 エンドポイント + 標準モデル名に修正) ---
async function runAIDetect() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return showToast("Gemini APIキーを設定してください");
    
    const btn = document.getElementById('aiBtn');
    btn.disabled = true;
    showToast("Gemini AIが建物を解析中...");
    
    const canvas = document.getElementById('photoCanvas');
    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    
    // 最も安定している v1 エンドポイントを使用し、モデル名を標準の gemini-1.5-flash に固定
    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
    
    const prompt = 'Detect the boundary of the main building in this image. Return the result as a JSON object with a "points" array containing [y, x] coordinate pairs (normalized 0-1000). Use around 15-20 points. Return ONLY the JSON object. Example format: {"points": [[100, 200], [150, 250], ...]}';

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: 'image/jpeg', data: base64 } }] }]
            })
        });
        
        const data = await res.json();
        
        // エラーハンドリングの強化
        if (data.error) {
            throw new Error(data.error.message || "API通信エラー");
        }

        if (!data.candidates || data.candidates.length === 0) {
            throw new Error("AIから有効な応答が得られませんでした");
        }

        const text = data.candidates[0].content.parts[0].text;
        const jsonMatch = text.match(/\{.*\}/s);
        if (!jsonMatch) throw new Error("AIがJSON形式のデータを返しませんでした");
        
        const json = JSON.parse(jsonMatch[0]);
        // [y, x] (0-1000) -> [x, y] (0.0-1.0)
        const points = json.points.map(p => [p[1]/1000, p[0]/1000]); 
        applyBuildingMask(points);
        showToast("検出成功！建物エリアをロックしました");
    } catch (e) {
        console.error("AI解析エラー詳細:", e);
        showToast("失敗: " + e.message);
    } finally { btn.disabled = false; }
}

function applyBuildingMask(points) {
    const cv = document.getElementById('photoCanvas');
    const bcv = document.getElementById('buildingCanvas');
    const ctx = bcv.getContext('2d');
    const W = cv.width, H = cv.height;
    
    const off = document.createElement('canvas'); off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.beginPath();
    points.forEach((p, i) => {
        const x = p[0] * W, y = p[1] * H;
        if (i === 0) octx.moveTo(x, y); else octx.lineTo(x, y);
    });
    octx.closePath(); octx.fill();
    
    const imgData = octx.getImageData(0, 0, W, H).data;
    app.buildingMask = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++) app.buildingMask[i] = imgData[i * 4 + 3] > 127 ? 1 : 0;
    
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    points.forEach((p, i) => {
        const x = p[0] * W, y = p[1] * H;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = '#8b5cf6'; ctx.lineWidth = 3; ctx.setLineDash([5, 5]); ctx.stroke();
}

function handleCanvasClick(e) {
    const scv = document.getElementById('selectCanvas');
    const rect = scv.getBoundingClientRect();
    const x = Math.round((e.clientX - rect.left) * (scv.width / rect.width));
    const y = Math.round((e.clientY - rect.top) * (scv.height / rect.height));
    
    if (app.buildingMask && app.buildingMask[y * scv.width + x] === 0) {
        return showToast("建物の外側です");
    }
    
    const areaM2 = 2500 / (app.ppm ** 2);
    app.regions.push({ x, y, area: areaM2, type: app.mode });
    drawRegions(); updateResultUI();
}

function drawRegions() {
    const scv = document.getElementById('selectCanvas');
    const ctx = scv.getContext('2d');
    ctx.clearRect(0,0,scv.width, scv.height);
    app.regions.forEach(r => {
        ctx.fillStyle = r.type === 'wall' ? 'rgba(255,107,43,0.5)' : 'rgba(16,185,129,0.5)';
        ctx.strokeStyle = r.type === 'wall' ? '#FF6B2B' : '#10b981';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(r.x, r.y, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    });
}

function updateResultUI() {
    const wall = app.regions.filter(r => r.type === 'wall').reduce((s, r) => s + r.area, 0);
    const win = app.regions.filter(r => r.type === 'window').reduce((s, r) => s + r.area, 0);
    document.getElementById('wallArea').textContent = wall.toFixed(1);
    document.getElementById('winArea').textContent = win.toFixed(1);
    document.getElementById('netArea').textContent = (wall - win).toFixed(1);
    document.getElementById('resGrid').style.display = app.regions.length ? 'grid' : 'none';
    document.getElementById('saveBtn').style.display = 'block';
}

function saveCurrentPhoto() {
    const wall = parseFloat(document.getElementById('wallArea').textContent);
    const win = parseFloat(document.getElementById('winArea').textContent);
    app.photos.push({ id: app.currentPhotoNum, wallArea: wall, winArea: win, netArea: wall - win });
    showToast(`${app.currentPhotoNum}枚目の積算を保存しました`);
    document.getElementById('toListBtn').style.display = 'block';
}

function addMorePhoto() {
    app.currentPhotoNum++;
    document.getElementById('displayPhotoNum').textContent = app.currentPhotoNum + '枚目';
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('canvasWrap').style.display = 'none';
    document.getElementById('toolBar').style.display = 'none';
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('photoInput').value = '';
    switchMode('measuring');
}

function renderList() {
    const list = document.getElementById('photoList');
    list.innerHTML = app.photos.map(p => `
        <div style="background: var(--bg3); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid var(--border);">
            <span>${p.id}枚目の写真</span>
            <span>正味面積: <b>${p.netArea.toFixed(1)}m²</b></span>
        </div>
    `).join('');
}

function renderConfirm() {
    const div = document.getElementById('confirmData');
    const total = app.photos.reduce((s, p) => s + p.netArea, 0);
    div.innerHTML = `
        <p>案件番号: ${app.session.projectNum}</p>
        <p>依頼主: ${app.session.clientName}</p>
        <p>合計塗装面積: <b style="color: var(--orange); font-size: 20px;">${total.toFixed(1)} m²</b></p>
    `;
}

async function sendToGAS() {
    const gasUrl = document.getElementById('gasId').value.trim();
    if (!gasUrl) return showToast("GASのWebApp URLを設定してください");
    const btn = document.getElementById('gasSubmitBtn');
    btn.disabled = true; showToast("送信中...");
    const payload = { ...app.session, totalArea: app.photos.reduce((s,p)=>s+p.netArea,0), photoCount: app.photos.length };
    try {
        await fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        showToast("送信完了しました！");
        setTimeout(() => location.reload(), 2500);
    } catch (e) {
        showToast("失敗: " + e.message); btn.disabled = false;
    }
}

function setMode(m) {
    app.mode = m;
    document.getElementById('typeWall').classList.toggle('active', m === 'wall');
    document.getElementById('typeWin').classList.toggle('active', m === 'window');
}
function undo() { app.regions.pop(); drawRegions(); updateResultUI(); }
function resetCanvas() { app.regions = []; drawRegions(); updateResultUI(); }
function openSettings() { document.getElementById('settingsModal').classList.add('active'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
function showToast(m) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
    document.body.appendChild(t); setTimeout(() => t.remove(), 3500);
}
</script>
</body>
</html>
