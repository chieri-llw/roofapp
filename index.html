<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>外壁積算 v10.4 Direct Test</title>
    <style>
        body { background: #0a0c10; color: #fff; font-family: sans-serif; text-align: center; }
        .panel { background: #111318; padding: 20px; border-radius: 12px; max-width: 400px; margin: 20px auto; }
        canvas { max-width: 100%; display: block; margin: 10px auto; }
        .btn { background: #FF6B2B; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h3>直接通信テスト版</h3>
    <input type="file" id="fileIn" onchange="handleFile(this)">
    <canvas id="mainCanvas"></canvas>
    <button class="btn" id="aiBtn" onclick="runDirectAI()">直接AI解析を実行</button>
</div>

<div id="res" style="color: #FF6B2B; font-weight: bold; margin-top: 20px;">結果待ち...</div>

<script>
function handleFile(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const cv = document.getElementById('mainCanvas');
            cv.width = 400; cv.height = img.height * (400 / img.width);
            cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
}

async function runDirectAI() {
    const key = prompt("新しく作ったAPIキーを入力してください");
    if(!key) return;

    const btn = document.getElementById('aiBtn');
    btn.innerText = "通信中...";
    const base64 = document.getElementById('mainCanvas').toDataURL('image/jpeg', 0.5).split(',')[1];

    // GASを通さず、Googleに直接投げるURL
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${key}`;

    const payload = {
        contents: [{
            parts: [
                { text: "Return ONLY JSON: {\"points\": [[y, x], ...]} for building outline." },
                { inline_data: { mime_type: "image/jpeg", data: base64 } }
            ]
        }]
    };

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const result = await res.json();
        
        if (res.status === 429) {
            document.getElementById('res').innerText = "❌ まだ429制限中です。アカウントがロックされています。";
        } else if (res.ok) {
            document.getElementById('res').innerText = "✅ 成功！GASなしなら通ります。";
            console.log(result);
        } else {
            document.getElementById('res').innerText = "Error: " + JSON.stringify(result);
        }
    } catch (e) {
        document.getElementById('res').innerText = "通信エラー（CORS等）: " + e.message;
    } finally {
        btn.innerText = "直接AI解析を実行";
    }
}
</script>
</body>
</html>
